<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Códigos Repetidos — DGR-YA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <style>
    body { background: #f5f5f5; font-family: Verdana, sans-serif; font-size: 0.82rem; margin: 0; }

    /* Summary bar */
    #summaryBar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; background: #212529; color: #fff;
      padding: 5px 16px 5px 290px; display: flex; gap: 10px; align-items: center; font-size: 0.78rem; height: 32px; }
    .sum-badge { padding: 1px 10px; border-radius: 4px; font-weight: bold; font-size: 0.72rem; }
    .sum-all   { background: #0d6efd; }
    .sum-tbl   { background: #198754; }
    .sum-ins   { background: #fd7e14; }
    .sum-rep   { background: #d63384; }

    /* Sidebar */
    #sidebar { width: 290px; position: fixed; top: 32px; left: 0; bottom: 0; background: #fff; border-right: 1px solid #ccc;
      display: flex; flex-direction: column; z-index: 10; }
    #searchWrap { padding: 5px 10px; }
    #searchWrap input { font-size: 0.78rem; }
    #filterWrap { padding: 0 10px 4px; display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn { font-size: 0.65rem; padding: 1px 6px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: #fff; }
    .filter-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    #sortWrap { padding: 0 10px 4px; display: flex; gap: 4px; font-size: 0.7rem; color: #666; align-items: center; flex-wrap: wrap; }
    .sort-btn { font-size: 0.65rem; padding: 1px 6px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: #fff; }
    .sort-btn.active { background: #6c757d; color: #fff; border-color: #6c757d; }
    #refList { flex: 1; overflow-y: auto; }

    .ref-item { cursor: pointer; padding: 4px 10px; border-bottom: 1px solid #f0f0f0; font-size: 0.78rem;
      display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .ref-item:hover { background: #e9ecef; }
    .ref-item.active { background: #0d6efd; color: #fff; }
    .ref-name { font-family: Consolas, monospace; font-weight: bold; font-size: 0.82rem; }
    .badges { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
    .b-count-t { background: #198754; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; font-family: Consolas, monospace; }
    .b-count-i { background: #fd7e14; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; font-family: Consolas, monospace; }
    .b-count-r { background: #d63384; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; font-family: Consolas, monospace; }
    #count { padding: 4px 10px; font-size: 0.68rem; color: #888; border-top: 1px solid #eee; }

    /* Main */
    #main { margin-left: 290px; margin-top: 32px; height: calc(100vh - 32px); overflow-y: auto; padding: 14px; }
    .placeholder-msg { color: #aaa; text-align: center; padding: 3rem 1rem; }

    .ref-header { background: #fff; border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; border: 1px solid #dee2e6; }
    .ref-header h2 { margin: 0 0 5px; font-family: Consolas, monospace; font-size: 1.45rem; color: #212529; }
    .ref-meta { font-size: 0.76rem; color: #6c757d; display: flex; flex-wrap: wrap; gap: 12px; }
    .ref-meta span strong { color: #212529; font-size: 0.9rem; }

    /* Section header (big) */
    .section-head { margin: 16px 0 8px; font-size: 0.84rem; font-weight: bold; color: #fff;
      padding: 6px 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .section-head.dup    { background: #d63384; }
    .section-head.unique { background: #6c757d; }
    .section-head .sub   { font-weight: normal; font-size: 0.7rem; opacity: 0.92; }

    /* Identical-text group (one per unique repeated text) */
    .idgroup { background: #fff; border: 1px solid #f2d1e0; border-radius: 5px; margin-bottom: 10px; overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
    .idgroup-header { background: #fdf0f5; padding: 8px 12px; border-bottom: 1px solid #f2d1e0;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
    .idgroup-text { flex: 1; font-size: 0.82rem; line-height: 1.45; color: #212529; word-break: break-word; }
    .idgroup-meta { flex-shrink: 0; display: flex; flex-direction: column; gap: 3px; align-items: flex-end; min-width: 120px; }
    .idgroup-badge { background: #d63384; color: #fff; font-weight: bold;
      padding: 2px 10px; border-radius: 12px; font-size: 0.74rem; white-space: nowrap; }
    .src-tag { padding: 0 6px; border-radius: 3px; font-weight: bold; font-family: Consolas, monospace; font-size: 0.65rem; }
    .src-tag.tbl { background: #d4edda; color: #155724; }
    .src-tag.ins { background: #ffe8d5; color: #7a4b0a; }
    .src-tag.mix { background: #e2d5f3; color: #3d1f6b; }
    .idgroup-example { font-size: 0.68rem; color: #6c757d; font-family: Consolas, monospace; white-space: nowrap; }
    .idgroup-example strong { color: #0d6efd; }
    .idgroup-toggle { cursor: pointer; color: #0d6efd; font-size: 0.68rem; padding: 1px 8px; border-radius: 3px;
      background: #fff; border: 1px solid #ced4da; user-select: none; white-space: nowrap; }
    .idgroup-toggle:hover { background: #e7f3ff; border-color: #0d6efd; }
    .idgroup-occurrences { padding: 4px 12px 8px; background: #fff; display: none; }
    .idgroup.expanded .idgroup-occurrences { display: block; }

    .global-toggle { cursor: pointer; background: rgba(255,255,255,0.18); color: #fff;
      border: 1px solid rgba(255,255,255,0.4); padding: 2px 10px; border-radius: 3px;
      font-size: 0.7rem; user-select: none; font-family: inherit; font-weight: normal; }
    .global-toggle:hover { background: rgba(255,255,255,0.3); }
    .occ-row { display: grid; grid-template-columns: 60px 130px 1fr; gap: 10px; align-items: center;
      padding: 2px 0; border-bottom: 1px dashed #f0f0f0; font-size: 0.73rem; }
    .occ-row:last-child { border-bottom: none; }
    .occ-pi  { font-family: Consolas, monospace; font-weight: bold; color: #0d6efd; }
    .occ-loc { font-size: 0.7rem; color: #6c757d; }
    .occ-loc .tag { display: inline-block; padding: 0 5px; border-radius: 3px;
      font-weight: bold; font-family: Consolas, monospace; font-size: 0.66rem; margin-right: 4px; }
    .occ-loc .tag.tbl { background: #d4edda; color: #155724; }
    .occ-loc .tag.ins { background: #ffe8d5; color: #7a4b0a; }
    .occ-loc .where  { font-style: italic; color: #6c757d; }
    .occ-src { color: #999; font-size: 0.68rem; text-align: right; }

    /* Unique-instance card */
    .split-head { font-size: 0.76rem; font-weight: bold; padding: 5px 10px; border-radius: 0 4px 4px 0;
      margin: 10px 0 5px; border-left: 4px solid; display: flex; justify-content: space-between; align-items: center; }
    .split-head.tbl { border-color: #198754; background: #d4edda; color: #155724; }
    .split-head.ins { border-color: #fd7e14; background: #ffe8d5; color: #7a4b0a; }
    .unique-item { background: #fff; border: 1px solid #dee2e6; border-radius: 4px;
      padding: 6px 12px; margin-bottom: 5px; font-size: 0.78rem; line-height: 1.4;
      display: grid; grid-template-columns: 60px 130px 1fr; gap: 10px; align-items: start; }
    .unique-item .inst-pi  { font-family: Consolas, monospace; font-weight: bold; color: #0d6efd; font-size: 0.82rem; }
    .unique-item .inst-loc { font-size: 0.7rem; color: #6c757d; }
    .unique-item .inst-loc .tag { display: inline-block; padding: 0 5px; border-radius: 3px;
      font-weight: bold; font-family: Consolas, monospace; font-size: 0.68rem; margin-right: 4px; }
    .unique-item .inst-loc .tag.tbl { background: #d4edda; color: #155724; }
    .unique-item .inst-loc .tag.ins { background: #ffe8d5; color: #7a4b0a; }
    .unique-item .inst-ctx { color: #212529; word-break: break-word; }

    .ref-hit { background: #fff3cd; padding: 1px 4px; border-radius: 3px; font-weight: bold;
      border: 1px solid #ffc107; font-family: Consolas, monospace; }

    /* Manual section card (raw HTML from 0-RAW/*.html) */
    .manual-card { background: #fff; border: 1px solid #c7e0ff; border-radius: 6px;
      padding: 12px 16px; margin-bottom: 12px; max-height: 55vh; overflow-y: auto;
      border-left: 4px solid #0d6efd; }
    .manual-card.missing { background: #fff8e1; border-color: #ffe082; border-left-color: #ffc107; color: #6c757d; }
    .manual-card.loading { background: #f8f9fa; border-left-color: #adb5bd; color: #6c757d; font-style: italic; }
    .manual-card-header { font-weight: bold; font-size: 0.85rem; color: #0d6efd;
      padding-bottom: 6px; border-bottom: 1px solid #e9ecef; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .manual-card-header .file { color: #6c757d; font-weight: normal; font-size: 0.7rem; font-family: Consolas, monospace; }
    .manual-body { font-size: 0.82rem; line-height: 1.5; color: #212529; }
    .manual-body h1, .manual-body h2, .manual-body h3, .manual-body h4 {
      font-size: 1rem; font-weight: bold; margin: 10px 0 6px; color: #0d6efd; font-family: inherit; }
    .manual-body .iataPara, .manual-body .iataNumberedPara { margin: 6px 0; }
    .manual-body .iataList { margin: 4px 0 4px 16px; padding-left: 8px; }
    .manual-body .iataListItem-alphabetical,
    .manual-body .iataListItem-bullet,
    .manual-body .iataListItem-numerical { margin: 3px 0; }
    .manual-body .iataListLbl-alphabetical,
    .manual-body .iataListLbl-bullet,
    .manual-body .iataListLbl-numerical { font-weight: bold; margin-right: 4px; color: #495057; }
    .manual-body .iataNotes { background: #f8f9fa; border-left: 3px solid #adb5bd;
      padding: 6px 10px; margin: 8px 0; font-size: 0.78rem; }
    .manual-body .iataNotesLabel { font-weight: bold; color: #495057; display: block; margin-bottom: 3px; }
    .manual-body .iataNote { margin: 4px 0; }
    .manual-body .iataitalic { font-style: italic; }
    .manual-body .iataVariations { font-size: 0.75rem; color: #6c757d; font-style: italic; margin: 4px 0; background: #fafafa; padding: 4px 8px; border-radius: 3px; }
    .manual-body a { color: #0d6efd; text-decoration: none; border-bottom: 1px dotted #0d6efd; pointer-events: none; }
    .manual-body table { border-collapse: collapse; margin: 6px 0; font-size: 0.78rem; }
    .manual-body table th, .manual-body table td { border: 1px solid #dee2e6; padding: 3px 6px; }
  </style>
</head>
<body>

<div id="summaryBar">
  <strong>Códigos Repetidos</strong>
  <span class="sum-badge sum-all" id="sumAll">0 refs</span>
  <span class="sum-badge sum-tbl" id="sumTbl">TBL 0</span>
  <span class="sum-badge sum-ins" id="sumIns">INS 0</span>
  <span class="sum-badge sum-rep" id="sumRep">DUP 0</span>
  <span style="opacity:0.6">· textos idénticos agrupados en categorías</span>
  <span style="margin-left:auto;opacity:0.65;font-size:0.7rem;">
    <a href="tests.html" style="color:#fff;">← volver</a>
  </span>
</div>

<div id="sidebar">
  <div id="searchWrap"><input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Filtrar ref (ej. 5.0.2)…"></div>
  <div id="filterWrap">
    <button class="filter-btn active" data-filter="all">Todo</button>
    <button class="filter-btn" data-filter="tbl">Tablas</button>
    <button class="filter-btn" data-filter="ins">Instr.</button>
    <button class="filter-btn" data-filter="multi">≥2</button>
    <button class="filter-btn" data-filter="dup">c/ dup</button>
  </div>
  <div id="sortWrap">
    ordenar:
    <button class="sort-btn active" data-sort="count">por #</button>
    <button class="sort-btn" data-sort="alpha">A-Z</button>
    <button class="sort-btn" data-sort="dup">por dup</button>
  </div>
  <div id="refList"></div>
  <div id="count"></div>
</div>

<div id="main">
  <div class="placeholder-msg">Cargando datos…</div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let tblData = null;
let insData = null;
let refMap  = {};
let activeRef = null;
let activeFilter = 'all';
let activeSort = 'count';

const REF_RE = /\b\d+\.\d+(?:\.\d+)*\b/g;

// Positions of refs that should be ignored:
//   (a) refs inside "División X.X [, X.X y X.X]" chains → hazard class divisions
//   (b) measurements like "1.0 kg", "30.5 °C", "2.5 L" → physical quantities
const DIVISION_RE = /\b(?:div\.|divs?\.|divisi[oó]n(?:es)?)\s+\d+\.\d+(?:\.\d+)*(?:\s*(?:,|y)\s*\d+\.\d+(?:\.\d+)*)*/gi;
// Units: only kg, L, °C (case-sensitive — avoids false positives with compat codes like 1.4S/1.4G and Spanish "a")
const UNIT_RE = /\b\d+\.\d+\s*(?:kg|L|°C)\b/g;

function findSkipPositions(text) {
  const positions = new Set();
  // División chains → mark every ref inside
  for (const m of text.matchAll(DIVISION_RE)) {
    const start = m.index;
    const refRe = /\d+\.\d+(?:\.\d+)*/g;
    let rm;
    while ((rm = refRe.exec(m[0])) !== null) {
      positions.add(start + rm.index);
    }
  }
  // Units → mark just the number
  for (const m of text.matchAll(UNIT_RE)) {
    positions.add(m.index);
  }
  return positions;
}

// Extract refs from a single string, skipping división-chains and measurements
function extractRefs(s) {
  const skip = findSkipPositions(s);
  const out = [];
  for (const m of s.matchAll(REF_RE)) {
    if (!skip.has(m.index)) out.push(m[0]);
  }
  return out;
}

// ─── MANUAL SECTION LOADER ───────────────────────────────
const MANUAL_DOC_CACHE = {};

function getManualFile(ref) {
  const parts = ref.split('.');
  const top = parts[0];
  const sec = parts[1];

  // Chapter 1 — single file
  if (top === '1') return '0-RAW/1.html';

  // Chapter 2 — one file 2.html for 2.0–2.7, split files for 2.8 / 2.8.3
  if (top === '2') {
    if (sec === '8') {
      if (parts[2] === '3') return '0-RAW/2.8.3.html';
      return '0-RAW/2.8.html';
    }
    return '0-RAW/2.html';
  }

  // Chapter 3 — one file per section (3.0, 3.1, 3.2, 3.3, 3.4 available)
  if (top === '3' && ['0','1','2','3','4'].includes(sec)) {
    return `0-RAW/3.${sec}.html`;
  }

  return null;
}

async function loadManualDoc(file) {
  if (MANUAL_DOC_CACHE[file]) return MANUAL_DOC_CACHE[file];
  const res = await fetch(file);
  const text = await res.text();
  const doc = new DOMParser().parseFromString(text, 'text/html');
  MANUAL_DOC_CACHE[file] = doc;
  return doc;
}

async function renderManualSection(ref) {
  const slot = document.getElementById('manualSlot');
  if (!slot) return;
  const file = getManualFile(ref);
  if (!file) {
    slot.innerHTML = `<div class="manual-card missing">
      <div class="manual-card-header">📕 Manual — Sección ${escH(ref)}</div>
      <div class="manual-body">Sección fuera de alcance (solo hay archivos para capítulos 1 y 2 en <code>0-RAW/</code>)</div>
    </div>`;
    return;
  }
  slot.innerHTML = `<div class="manual-card loading">
    <div class="manual-card-header">📕 Manual — Sección ${escH(ref)} <span class="file">${escH(file)}</span></div>
    <div class="manual-body">Cargando…</div>
  </div>`;
  try {
    const doc = await loadManualDoc(file);
    const el = doc.getElementById(`DGR-${ref}`);
    if (!el) {
      slot.innerHTML = `<div class="manual-card missing">
        <div class="manual-card-header">📕 Manual — Sección ${escH(ref)} <span class="file">${escH(file)}</span></div>
        <div class="manual-body">Sección no encontrada dentro del archivo.</div>
      </div>`;
      return;
    }
    slot.innerHTML = `<div class="manual-card">
      <div class="manual-card-header">📕 Manual — Sección ${escH(ref)} <span class="file">${escH(file)}</span></div>
      <div class="manual-body">${el.outerHTML}</div>
    </div>`;
  } catch (err) {
    slot.innerHTML = `<div class="manual-card missing">Error cargando manual: ${escH(err.message || err)}</div>`;
  }
}

// ─── HELPERS ─────────────────────────────────────────────
function escH(s) {
  return String(s || '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}
function highlightRef(text, ref) {
  // Don't highlight occurrences that are inside "División …" chains or measurements
  const skip = findSkipPositions(text);
  const refLen = ref.length;
  const matches = [];
  // Negative lookahead (?!\.\d) prevents matching "5.0.2" inside "5.0.2.5" etc.
  const pat = new RegExp('\\b' + ref.replace(/\./g,'\\.') + '\\b(?!\\.\\d)', 'g');
  let m;
  while ((m = pat.exec(text)) !== null) {
    if (!skip.has(m.index)) matches.push({ start: m.index, end: m.index + refLen });
  }
  if (!matches.length) return escH(text);
  // Build the output, escaping each segment and wrapping matched ranges
  let out = '';
  let cur = 0;
  for (const seg of matches) {
    out += escH(text.slice(cur, seg.start));
    out += `<span class="ref-hit">${escH(text.slice(seg.start, seg.end))}</span>`;
    cur = seg.end;
  }
  out += escH(text.slice(cur));
  return out;
}
function normalizeText(s) {
  return String(s || '').toLowerCase().trim()
    .replace(/[\u00AD\u200B-\u200F\u2060\uFEFF]/g, '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}

// ─── EXTRACT REFS ────────────────────────────────────────
function indexAll() {
  refMap = {};

  for (const e of tblData.instrucciones_embalaje) {
    const pi = String(e.codigo || '');
    (e.tablas || []).forEach((t, ti) => {
      const scan = (where, txt) => {
        if (!txt) return;
        const s = String(txt);
        const unique = [...new Set(extractRefs(s))];
        for (const m of unique) {
          if (!refMap[m]) refMap[m] = { tbl: [], ins: [], piSet: new Set() };
          refMap[m].tbl.push({ pi, ti, where, ctx: s, src: 'tbl' });
          refMap[m].piSet.add(pi);
        }
      };
      scan('título', t.titulo);
      (t.encabezados || []).forEach(h => scan('header', h));
      (t.filas || []).forEach(row => {
        for (const [k, v] of Object.entries(row)) scan(`celda [${k}]`, v);
      });
      (t.footers || []).forEach(f => scan('footer', f.texto));
    });
  }

  const walk = (pi, item, path) => {
    const t = item.texto;
    const lines = Array.isArray(t) ? t : [String(t || '')];
    lines.forEach((ln, j) => {
      const s = String(ln);
      const unique = [...new Set(extractRefs(s))];
      for (const m of unique) {
        if (!refMap[m]) refMap[m] = { tbl: [], ins: [], piSet: new Set() };
        refMap[m].ins.push({ pi, path: path + (lines.length > 1 ? `.${j+1}` : ''), ctx: s, src: 'ins' });
        refMap[m].piSet.add(pi);
      }
    });
    (item.items || []).forEach((s, k) => walk(pi, s, path + `.i${k+1}`));
  };
  for (const [pi, entries] of Object.entries(insData)) {
    entries.forEach((it, i) => walk(pi, it, `#${i+1}`));
  }

  // Aggregates + identical-text groups
  for (const r of Object.keys(refMap)) {
    const info = refMap[r];
    info.total = info.tbl.length + info.ins.length;
    const allOccs = [...info.tbl, ...info.ins];
    const groups = new Map();
    allOccs.forEach(x => {
      const key = normalizeText(x.ctx);
      if (!groups.has(key)) groups.set(key, { text: x.ctx, occurrences: [] });
      groups.get(key).occurrences.push(x);
    });
    info.groups = [...groups.values()].sort((a,b) => b.occurrences.length - a.occurrences.length);
    info.dupGroups = info.groups.filter(g => g.occurrences.length >= 2);
    info.dupOccurrences = info.dupGroups.reduce((s,g)=>s+g.occurrences.length, 0);
  }
}

// ─── SIDEBAR ─────────────────────────────────────────────
function refCmp(a, b) {
  if (activeSort === 'count') {
    const d = refMap[b].total - refMap[a].total;
    if (d !== 0) return d;
  } else if (activeSort === 'dup') {
    const d = refMap[b].dupOccurrences - refMap[a].dupOccurrences;
    if (d !== 0) return d;
  }
  const pa = a.split('.').map(Number);
  const pb = b.split('.').map(Number);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const x = pa[i] ?? -1, y = pb[i] ?? -1;
    if (x !== y) return x - y;
  }
  return 0;
}

function renderSidebar() {
  const q = document.getElementById('searchInput').value.trim();
  let list = Object.keys(refMap);
  if (q) list = list.filter(r => r.includes(q));
  if (activeFilter === 'tbl')   list = list.filter(r => refMap[r].tbl.length > 0);
  if (activeFilter === 'ins')   list = list.filter(r => refMap[r].ins.length > 0);
  if (activeFilter === 'multi') list = list.filter(r => refMap[r].total >= 2);
  if (activeFilter === 'dup')   list = list.filter(r => refMap[r].dupGroups.length > 0);
  list.sort(refCmp);

  let html = '';
  for (const r of list) {
    const info = refMap[r];
    const act = r === activeRef ? ' active' : '';
    html += `<div class="ref-item${act}" data-ref="${escH(r)}">
      <span class="ref-name">${escH(r)}</span>
      <span class="badges">
        ${info.tbl.length ? `<span class="b-count-t" title="en tablas">T${info.tbl.length}</span>` : ''}
        ${info.ins.length ? `<span class="b-count-i" title="en instrucciones">I${info.ins.length}</span>` : ''}
        ${info.dupOccurrences ? `<span class="b-count-r" title="apariciones en grupos idénticos">=${info.dupOccurrences}</span>` : ''}
      </span>
    </div>`;
  }

  document.getElementById('refList').innerHTML = html || `<div class="placeholder-msg" style="padding:1rem 0.5rem;font-size:0.75rem;">sin resultados</div>`;
  document.getElementById('count').textContent = `${list.length} refs visibles / ${Object.keys(refMap).length} total`;
}

// ─── MAIN PANEL ──────────────────────────────────────────
function renderOccRow(x) {
  const tag = x.src === 'tbl'
    ? `<span class="tag tbl">T${x.ti}</span><span class="where">${escH(x.where)}</span>`
    : `<span class="tag ins">${escH(x.path)}</span>`;
  return `<div class="occ-row">
    <span class="occ-pi">PI ${escH(x.pi)}</span>
    <span class="occ-loc">${tag}</span>
    <span class="occ-src">${x.src === 'tbl' ? 'tabla' : 'instrucción'}</span>
  </div>`;
}

function renderInstances(ref) {
  const info = refMap[ref];
  if (!info) return `<div class="placeholder-msg">Ref no encontrada</div>`;

  const uniq = info.groups.filter(g => g.occurrences.length === 1);

  const head = `<div class="ref-header">
    <h2>${escH(ref)}</h2>
    <div class="ref-meta">
      <span><strong>${info.total}</strong> apariciones</span>
      <span><strong>${info.piSet.size}</strong> PIs distintas</span>
      <span><strong>${info.tbl.length}</strong> tablas</span>
      <span><strong>${info.ins.length}</strong> instrucciones</span>
      <span><strong>${info.groups.length}</strong> textos distintos</span>
      <span style="color:#d63384;"><strong>${info.dupGroups.length}</strong> grupos duplicados (${info.dupOccurrences})</span>
      <span><strong>${uniq.length}</strong> únicos</span>
    </div>
  </div>
  <div id="manualSlot"></div>`;

  let body = '';

  // ── DUPLICATED GROUPS ──
  if (info.dupGroups.length) {
    body += `<div class="section-head dup">
      <span>📋 Textos idénticos · ${info.dupGroups.length} ${info.dupGroups.length === 1 ? 'grupo' : 'grupos'} · ${info.dupOccurrences} apariciones</span>
      <span style="display:flex;gap:8px;align-items:center;">
        <span class="sub">el mismo texto se repite en múltiples lugares</span>
        <button class="global-toggle" data-global-toggle="expand">▸ expandir todos</button>
      </span>
    </div>`;
    info.dupGroups.forEach((g, gi) => {
      const nT = g.occurrences.filter(o => o.src === 'tbl').length;
      const nI = g.occurrences.filter(o => o.src === 'ins').length;
      const mix = nT > 0 && nI > 0;
      // Order: tbl first (by pi/ti), then ins (by pi/path)
      const ordered = [
        ...g.occurrences.filter(o => o.src === 'tbl').sort((a,b)=>a.pi.localeCompare(b.pi) || a.ti-b.ti),
        ...g.occurrences.filter(o => o.src === 'ins').sort((a,b)=>a.pi.localeCompare(b.pi) || a.path.localeCompare(b.path)),
      ];
      // Unique PIs for example display
      const uniquePis = [...new Set(ordered.map(o => o.pi))];
      const examplePi = uniquePis[0];
      const morePis = uniquePis.length > 1 ? ` <span style="opacity:0.7">(+${uniquePis.length - 1} PI${uniquePis.length - 1 === 1 ? '' : 's'} más)</span>` : '';
      body += `<div class="idgroup" data-idx="${gi}">
        <div class="idgroup-header">
          <div class="idgroup-text">${highlightRef(g.text, ref)}</div>
          <div class="idgroup-meta">
            <span class="idgroup-badge">×${g.occurrences.length}</span>
            <div style="display:flex;gap:3px;">
              ${nT ? `<span class="src-tag tbl">T ${nT}</span>` : ''}
              ${nI ? `<span class="src-tag ins">I ${nI}</span>` : ''}
              ${mix ? `<span class="src-tag mix">MIX</span>` : ''}
            </div>
            <span class="idgroup-example">ej: <strong>PI ${escH(examplePi)}</strong>${morePis}</span>
            <span class="idgroup-toggle" data-group-toggle>▸ ver ${ordered.length} apariciones</span>
          </div>
        </div>
        <div class="idgroup-occurrences">
          ${ordered.map(o => renderOccRow(o)).join('')}
        </div>
      </div>`;
    });
  }

  // ── UNIQUE ──
  if (uniq.length) {
    body += `<div class="section-head unique">
      <span>◆ Textos únicos · ${uniq.length}</span>
      <span class="sub">aparecen una sola vez</span>
    </div>`;
    const uT = uniq.filter(g => g.occurrences[0].src === 'tbl');
    const uI = uniq.filter(g => g.occurrences[0].src === 'ins');

    if (uT.length) {
      body += `<div class="split-head tbl"><span>📊 En tablas</span><span>${uT.length}</span></div>`;
      // Sort by PI then ti
      uT.sort((a,b) => a.occurrences[0].pi.localeCompare(b.occurrences[0].pi) || a.occurrences[0].ti - b.occurrences[0].ti);
      for (const g of uT) {
        const x = g.occurrences[0];
        body += `<div class="unique-item">
          <span class="inst-pi">PI ${escH(x.pi)}</span>
          <span class="inst-loc"><span class="tag tbl">T${x.ti}</span>${escH(x.where)}</span>
          <span class="inst-ctx">${highlightRef(x.ctx, ref)}</span>
        </div>`;
      }
    }
    if (uI.length) {
      body += `<div class="split-head ins"><span>📝 En instrucciones</span><span>${uI.length}</span></div>`;
      uI.sort((a,b) => a.occurrences[0].pi.localeCompare(b.occurrences[0].pi) || a.occurrences[0].path.localeCompare(b.occurrences[0].path));
      for (const g of uI) {
        const x = g.occurrences[0];
        body += `<div class="unique-item">
          <span class="inst-pi">PI ${escH(x.pi)}</span>
          <span class="inst-loc"><span class="tag ins">${escH(x.path)}</span></span>
          <span class="inst-ctx">${highlightRef(x.ctx, ref)}</span>
        </div>`;
      }
    }
  }

  if (!body) body = `<div class="placeholder-msg">Sin apariciones</div>`;

  return head + body;
}

function selectRef(ref) {
  activeRef = ref;
  document.querySelectorAll('.ref-item').forEach(el => {
    el.classList.toggle('active', el.dataset.ref === ref);
  });
  document.getElementById('main').innerHTML = renderInstances(ref);
  document.getElementById('main').scrollTop = 0;
  attachMainHandlers();
  renderManualSection(ref);
}

function attachMainHandlers() {
  // Per-group toggle
  document.querySelectorAll('[data-group-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const g = btn.closest('.idgroup');
      const wasOpen = g.classList.toggle('expanded');
      const count = g.querySelectorAll('.occ-row').length;
      btn.textContent = wasOpen ? `▾ ocultar apariciones` : `▸ ver ${count} apariciones`;
    });
  });
  // Global toggle
  document.querySelectorAll('[data-global-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.globalToggle;
      const groups = document.querySelectorAll('.idgroup');
      if (mode === 'expand') {
        groups.forEach(g => g.classList.add('expanded'));
        groups.forEach(g => {
          const t = g.querySelector('[data-group-toggle]');
          if (t) t.textContent = '▾ ocultar apariciones';
        });
        btn.textContent = '▾ colapsar todos';
        btn.dataset.globalToggle = 'collapse';
      } else {
        groups.forEach(g => g.classList.remove('expanded'));
        groups.forEach(g => {
          const t = g.querySelector('[data-group-toggle]');
          const count = g.querySelectorAll('.occ-row').length;
          if (t) t.textContent = `▸ ver ${count} apariciones`;
        });
        btn.textContent = '▸ expandir todos';
        btn.dataset.globalToggle = 'expand';
      }
    });
  });
}

// ─── EVENTS ──────────────────────────────────────────────
document.getElementById('refList').addEventListener('click', e => {
  const it = e.target.closest('.ref-item');
  if (!it) return;
  selectRef(it.dataset.ref);
});

document.getElementById('searchInput').addEventListener('input', renderSidebar);

document.getElementById('filterWrap').addEventListener('click', e => {
  const b = e.target.closest('.filter-btn');
  if (!b) return;
  activeFilter = b.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x === b));
  renderSidebar();
});

document.getElementById('sortWrap').addEventListener('click', e => {
  const b = e.target.closest('.sort-btn');
  if (!b) return;
  activeSort = b.dataset.sort;
  document.querySelectorAll('.sort-btn').forEach(x => x.classList.toggle('active', x === b));
  renderSidebar();
});

// ─── INIT ────────────────────────────────────────────────
async function init() {
  document.getElementById('count').textContent = 'Cargando…';
  const [tbl, ins] = await Promise.all([
    fetch('embalajes_tabla_claude.json').then(r => r.json()),
    fetch('instrucciones_embalaje.json').then(r => r.json()),
  ]);
  tblData = tbl;
  insData = ins;
  indexAll();

  const totalTbl = Object.values(refMap).reduce((s,r)=>s+r.tbl.length,0);
  const totalIns = Object.values(refMap).reduce((s,r)=>s+r.ins.length,0);
  const totalDup = Object.values(refMap).reduce((s,r)=>s+r.dupOccurrences,0);
  document.getElementById('sumAll').textContent = `${Object.keys(refMap).length} refs`;
  document.getElementById('sumTbl').textContent = `TBL ${totalTbl}`;
  document.getElementById('sumIns').textContent = `INS ${totalIns}`;
  document.getElementById('sumRep').textContent = `DUP ${totalDup}`;

  renderSidebar();

  const first = Object.keys(refMap).sort(refCmp)[0];
  if (first) selectRef(first);
  else document.getElementById('main').innerHTML = '<div class="placeholder-msg">Sin referencias</div>';
}
init().catch(err => {
  document.getElementById('main').innerHTML = `<div class="placeholder-msg">Error: ${escH(err.message || err)}</div>`;
});
</script>
</body>
</html>
