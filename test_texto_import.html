<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texto Import Check — HTML vs JSON</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <style>
    body { background: #f5f5f5; font-family: Verdana, sans-serif; font-size: 0.82rem; margin: 0; }

    /* Summary bar */
    #summaryBar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; background: #212529; color: #fff;
      padding: 5px 16px 5px 220px; display: flex; gap: 18px; align-items: center; font-size: 0.78rem; height: 32px; }
    .sum-badge { padding: 1px 10px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
    .sum-pass { background: #198754; }
    .sum-fail { background: #dc3545; }
    .sum-skip { background: #6c757d; }

    /* Sidebar */
    #sidebar { width: 210px; position: fixed; top: 32px; left: 0; bottom: 0; background: #fff; border-right: 1px solid #ccc;
      display: flex; flex-direction: column; z-index: 10; }
    #sidebar h6 { padding: 8px 10px 0; margin: 0; font-size: 0.8rem; }
    #searchWrap { padding: 5px 10px; }
    #searchWrap input { font-size: 0.78rem; }
    #filterWrap { padding: 0 10px 4px; display: flex; gap: 4px; }
    .filter-btn { font-size: 0.65rem; padding: 1px 6px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: #fff; }
    .filter-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    #fileList { flex: 1; overflow-y: auto; }
    .folder-item { cursor: pointer; padding: 5px 10px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 0.72rem; background: #f8f9fa; }
    .folder-item:hover { background: #dee2e6; }
    .folder-files { display: none; }
    .folder-files.open { display: block; }
    .file-item { cursor: pointer; padding: 3px 10px 3px 18px; border-bottom: 1px solid #f0f0f0; font-size: 0.76rem; display: flex; justify-content: space-between; align-items: center; }
    .file-item:hover { background: #e9ecef; }
    .file-item.active { background: #0d6efd; color: #fff; }
    .file-item.active .b-un, .file-item.active .b-skip { opacity: 0.9; }
    .b-un   { background: #fd7e14; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; font-weight: bold; }
    .b-none { background: #adb5bd; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; }
    .b-skip { background: #6c757d; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; }
    #count { padding: 4px 10px; font-size: 0.68rem; color: #888; border-top: 1px solid #eee; }

    /* Main */
    #main { margin-left: 210px; margin-top: 32px; display: flex; flex-direction: column; height: calc(100vh - 32px); }
    .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .panel-header { background: #343a40; color: #fff; padding: 5px 10px; font-weight: bold; font-size: 0.82rem;
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .panel-header small { font-weight: normal; opacity: 0.7; }
    .panel-body { flex: 1; overflow-y: auto; background: #fff; padding: 12px; }
    .panel-body.no-pad { padding: 0; overflow: hidden; }
    .panel-body iframe { width: 100%; height: 100%; border: none; display: block; }
    .divider { height: 4px; background: #6c757d; cursor: row-resize; flex-shrink: 0; }
    .divider:hover { background: #0d6efd; }

    /* Paragraph blocks */
    .para-block { margin-bottom: 10px; padding: 8px 10px; border-radius: 4px; line-height: 1.45; }
    .para-html { background: #e7f3ff; border-left: 4px solid #0d6efd; }
    .para-json { background: #f1f3f5; border-left: 4px solid #6c757d; }
    .para-json.has-un-field { border-left-color: #fd7e14; background: #fff4e6; }
    .para-nested { margin-bottom: 6px; margin-top: 6px; padding: 6px 10px; }
    .nested-items { margin-top: 8px; margin-left: 18px; border-left: 2px dashed #adb5bd; padding-left: 10px; }
    .para-line { padding: 3px 0; }
    .para-line + .para-line { border-top: 1px dashed #ced4da; margin-top: 3px; }
    .para-idx { display: inline-block; font-size: 0.62rem; color: #fff; background: #495057;
      padding: 1px 6px; border-radius: 10px; margin-right: 6px; font-weight: bold; vertical-align: middle; }

    /* UN highlight — MUY visible */
    .un-hit {
      display: inline-block;
      background: #dc3545;
      color: #fff;
      font-weight: bold;
      padding: 1px 7px;
      border-radius: 4px;
      margin: 0 1px;
      font-family: Consolas, monospace;
      font-size: 0.9em;
      letter-spacing: 0.03em;
      box-shadow: 0 0 0 2px #ffc1c7;
    }
    .un-hit.from-field {
      background: #fd7e14;
      box-shadow: 0 0 0 2px #ffe0b3;
    }

    .un-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .un-field-label { font-size: 0.7rem; color: #6c757d; margin-top: 6px; }
    .un-field-tag {
      display: inline-block;
      background: #fd7e14;
      color: #fff;
      font-weight: bold;
      padding: 0 6px;
      border-radius: 3px;
      font-family: Consolas, monospace;
      font-size: 0.72rem;
    }

    /* Issue bar */
    .issue-bar { padding: 5px 10px; border-bottom: 1px solid #ddd; font-size: 0.72rem; flex-shrink: 0; }
    .issue-bar.ok-bar { background: #d1e7dd; }
    .issue-bar.warn-bar { background: #fff3cd; }
    .issue-bar.fail-bar { background: #f8d7da; }

    .placeholder-msg { color: #aaa; text-align: center; padding: 3rem 1rem; }

    /* Summary legend */
    .legend {
      margin-left: auto; font-size: 0.7rem; opacity: 0.75;
    }
  </style>
</head>
<body>

<!-- Summary bar -->
<div id="summaryBar">
  <strong>Texto Import Check</strong>
  <span class="sum-badge sum-pass" id="sumWithUn">CON UN 0</span>
  <span class="sum-badge sum-fail" id="sumNoUn">SIN UN 0</span>
  <span class="sum-badge sum-skip" id="sumSkip">SKIP 0</span>
  <span style="opacity:0.5" id="sumTotal"></span>
  <span class="legend">
    <span class="un-hit" style="box-shadow:none;font-size:0.65rem;padding:0 5px;">UN 0509</span> en texto
    &nbsp;·&nbsp;
    <span class="un-hit from-field" style="box-shadow:none;font-size:0.65rem;padding:0 5px;">un:</span> campo JSON
  </span>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="searchWrap"><input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Buscar PI…"></div>
  <div id="filterWrap">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="un">Con UN</button>
    <button class="filter-btn" data-filter="none">Sin UN</button>
    <button class="filter-btn" data-filter="skip">Skip</button>
  </div>
  <div id="fileList"></div>
  <div id="count"></div>
</div>

<!-- Main split panels -->
<div id="main">
  <div class="panel" id="jsonPanel">
    <div class="panel-header">JSON instrucciones_embalaje.json <small id="jsonLabel"></small></div>
    <div id="jsonIssues"></div>
    <div class="panel-body" id="jsonBody"><div class="placeholder-msg">Elegir un PI a la izquierda</div></div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="panel" id="htmlPanel">
    <div class="panel-header">PDF Original <small id="htmlLabel"></small></div>
    <div id="htmlIssues"></div>
    <div class="panel-body no-pad" id="htmlBody"><div class="placeholder-msg" style="padding:3rem 1rem;">Elegir un PI a la izquierda</div></div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────
let instrMap = {};
let piStats = {}; // pi -> { hasUn, hasJson, jsonUns, htmlUns }
let activeFilter = 'all';

const TREE = {
  "Clase 1 - Explosivos":["1/101.html","1/114.html","1/130.html","1/131.html","1/133.html","1/134.html","1/135.html","1/136.html","1/137.html","1/138.html","1/139.html","1/140.html","1/141.html","1/142.html","1/143.html"],
  "Clase 2 - Gases":["2/200.html","2/201.html","2/202.html","2/203.html","2/206.html","2/208.html","2/211.html","2/213.html","2/214.html","2/215.html","2/216.html","2/217.html","2/218.html","2/219.html","2/220.html","2/222.html","2/Y203.html","2/Y215.html"],
  "Clase 3 - Liquidos":["3/350.html","3/351.html","3/352.html","3/353.html","3/354.html","3/355.html","3/360.html","3/361.html","3/362.html","3/363.html","3/364.html","3/365.html","3/366.html","3/370.html","3/371.html","3/372.html","3/373.html","3/374.html","3/375.html","3/376.html","3/377.html","3/378.html","3/Y340.html","3/Y341.html","3/Y342.html","3/Y343.html","3/Y344.html","3/Y370.html","3/Y373.html","3/Y374.html"],
  "Clase 4 - Solidos":["4/445.html","4/446.html","4/448.html","4/449.html","4/450.html","4/451.html","4/452.html","4/453.html","4/454.html","4/455.html","4/456.html","4/457.html","4/458.html","4/459.html","4/462.html","4/463.html","4/464.html","4/465.html","4/466.html","4/467.html","4/468.html","4/469.html","4/470.html","4/471.html","4/472.html","4/473.html","4/478.html","4/479.html","4/480.html","4/481.html","4/482.html","4/483.html","4/484.html","4/485.html","4/486.html","4/487.html","4/489.html","4/490.html","4/491.html","4/492.html","4/493.html","4/494.html","4/495.html","4/496.html","4/497.html","4/499.html","4/Y440.html","4/Y441.html","4/Y442.html","4/Y443.html","4/Y450.html","4/Y454.html","4/Y455.html","4/Y457.html","4/Y458.html","4/Y474.html","4/Y475.html","4/Y476.html","4/Y477.html","4/Y495.html"],
  "Clase 5 - Comburentes":["5/550.html","5/551.html","5/553.html","5/554.html","5/555.html","5/557.html","5/558.html","5/559.html","5/561.html","5/562.html","5/563.html","5/565.html","5/570.html","5/Y540.html","5/Y541.html","5/Y543.html","5/Y544.html","5/Y545.html","5/Y546.html"],
  "Clase 6 - Toxicos":["6/603.html","6/620.html","6/621.html","6/650.html","6/651.html","6/652.html","6/653.html","6/654.html","6/655.html","6/657.html","6/658.html","6/659.html","6/660.html","6/661.html","6/662.html","6/663.html","6/665.html","6/666.html","6/667.html","6/668.html","6/669.html","6/670.html","6/672.html","6/673.html","6/674.html","6/675.html","6/676.html","6/677.html","6/679.html","6/680.html","6/681.html","6/699.html","6/Y640.html","6/Y641.html","6/Y642.html","6/Y644.html","6/Y645.html","6/Y680.html"],
  "Clase 8 - Corrosivos":["8/850.html","8/851.html","8/852.html","8/854.html","8/855.html","8/856.html","8/858.html","8/859.html","8/860.html","8/862.html","8/863.html","8/864.html","8/866.html","8/867.html","8/868.html","8/869.html","8/870.html","8/871.html","8/872.html","8/873.html","8/874.html","8/875.html","8/876.html","8/Y840.html","8/Y841.html","8/Y843.html","8/Y844.html","8/Y845.html","8/Y873.html"],
  "Clase 9 - Miscelaneas":["9/950.html","9/951.html","9/952.html","9/953.html","9/954.html","9/955.html","9/956.html","9/957.html","9/958.html","9/959.html","9/960.html","9/961.html","9/962.html","9/964.html","9/965.html","9/966.html","9/967.html","9/968.html","9/969.html","9/970.html","9/971.html","9/972.html","9/975.html","9/976.html","9/977.html","9/978.html","9/Y956.html","9/Y958.html","9/Y960.html","9/Y963.html","9/Y964.html"]
};

const BASE = '0-RAW/embalajes/';
const PDF_BASE = 'PDF/PI/';
function getName(f) { return f.split('/').pop().replace('.html',''); }
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Highlight all "UN XXXX" references in a text string
function highlightUN(text) {
  return escH(text).replace(/\bUN\s*0*\d{3,4}\b/g, m => `<span class="un-hit">${m}</span>`);
}

// Extract all UN numbers from a string (4 digit, zero-padded)
function extractUNs(text) {
  const out = new Set();
  const re = /\bUN\s*0*(\d{3,4})\b/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    out.add(String(m[1]).padStart(4, '0'));
  }
  return out;
}

// ─── STATS ────────────────────────────────────────────────
function analyzePI(pi) {
  const entry = instrMap[pi];
  if (!entry) return { hasJson: false, hasUn: false, jsonUns: new Set() };
  const jsonUns = new Set();
  for (const item of entry) {
    if (Array.isArray(item.un)) for (const u of item.un) jsonUns.add(String(u).padStart(4,'0'));
    const txtAll = Array.isArray(item.texto) ? item.texto.join(' ') : String(item.texto || '');
    for (const u of extractUNs(txtAll)) jsonUns.add(u);
  }
  return { hasJson: true, hasUn: jsonUns.size > 0, jsonUns };
}

function piCategory(pi) {
  const s = piStats[pi] || analyzePI(pi);
  if (!s.hasJson) return 'skip';
  return s.hasUn ? 'un' : 'none';
}

// ─── SUMMARY ─────────────────────────────────────────────
function updateSummary() {
  let withUn=0, noUn=0, skip=0;
  for (const files of Object.values(TREE)) {
    for (const f of files) {
      const c = piCategory(getName(f));
      if (c==='un') withUn++; else if (c==='none') noUn++; else skip++;
    }
  }
  document.getElementById('sumWithUn').textContent = `CON UN ${withUn}`;
  document.getElementById('sumNoUn').textContent = `SIN UN ${noUn}`;
  document.getElementById('sumSkip').textContent = `SKIP ${skip}`;
  document.getElementById('sumTotal').textContent = `${withUn+noUn+skip} PIs total`;
}

// ─── FILE LIST ───────────────────────────────────────────
function renderTree(filter) {
  const q = (filter || '').toUpperCase();
  let html = '', total = 0;
  for (const [folder, files] of Object.entries(TREE)) {
    let matched = q ? files.filter(f => getName(f).toUpperCase().includes(q)) : files;
    if (activeFilter !== 'all') matched = matched.filter(f => piCategory(getName(f)) === activeFilter);
    if (!matched.length) continue;
    html += `<div class="folder-item" data-folder="${folder}">${folder} (${matched.length})</div>`;
    html += `<div class="folder-files${q || activeFilter!=='all' ? ' open':''}" data-folder="${folder}">`;
    for (const f of matched) {
      const pi = getName(f);
      const c = piCategory(pi);
      const s = piStats[pi] || { jsonUns: new Set() };
      let badge;
      if (c === 'skip') badge = `<span class="b-skip">SKIP</span>`;
      else if (c === 'un') badge = `<span class="b-un">${s.jsonUns.size} UN</span>`;
      else badge = `<span class="b-none">—</span>`;
      html += `<div class="file-item" data-file="${f}" data-pi="${pi}"><span>${pi}</span>${badge}</div>`;
      total++;
    }
    html += '</div>';
  }
  document.getElementById('fileList').innerHTML = html;
  document.getElementById('count').textContent = total + ' PIs';
}

// ─── HTML IFRAME ─────────────────────────────────────────
// CSS + script to inject into iframe: highlight every "UN XXXX" in the rendered PI
const IFRAME_HIGHLIGHT_CSS = `
  .un-hit-iframe {
    display: inline-block;
    background: #dc3545 !important;
    color: #fff !important;
    font-weight: bold;
    padding: 1px 7px;
    border-radius: 4px;
    margin: 0 1px;
    font-family: Consolas, monospace;
    font-size: 0.95em;
    box-shadow: 0 0 0 2px #ffc1c7;
  }
  .un-hit-iframe * { color: #fff !important; text-decoration: none !important; }
`;

function injectHighlight(iframeDoc) {
  try {
    // Inject CSS
    const style = iframeDoc.createElement('style');
    style.textContent = IFRAME_HIGHLIGHT_CSS;
    iframeDoc.head.appendChild(style);

    // Wrap every "UN XXXX" in a highlight span (text nodes only, skip script/style)
    const re = /\bUN\s*0*\d{3,4}\b/g;
    const walker = iframeDoc.createTreeWalker(iframeDoc.body, NodeFilter.SHOW_TEXT, null);
    const toProcess = [];
    let n;
    while ((n = walker.nextNode())) {
      const parent = n.parentNode;
      if (!parent) continue;
      const tag = parent.tagName;
      if (tag === 'SCRIPT' || tag === 'STYLE') continue;
      if (re.test(n.nodeValue)) toProcess.push(n);
      re.lastIndex = 0;
    }
    for (const node of toProcess) {
      const parent = node.parentNode;
      const frag = iframeDoc.createDocumentFragment();
      const txt = node.nodeValue;
      let last = 0, m;
      const r2 = /\bUN\s*0*\d{3,4}\b/g;
      while ((m = r2.exec(txt)) !== null) {
        if (m.index > last) frag.appendChild(iframeDoc.createTextNode(txt.slice(last, m.index)));
        const span = iframeDoc.createElement('span');
        span.className = 'un-hit-iframe';
        span.textContent = m[0];
        frag.appendChild(span);
        last = m.index + m[0].length;
      }
      if (last < txt.length) frag.appendChild(iframeDoc.createTextNode(txt.slice(last)));
      // If parent is an <a>, also wrap the anchor itself
      if (parent.tagName === 'A' && parent.childNodes.length === 1 && parent.firstChild === node) {
        parent.classList.add('un-hit-iframe');
        parent.innerHTML = '';
        parent.appendChild(frag);
      } else {
        parent.replaceChild(frag, node);
      }
    }
  } catch (e) {
    console.error('injectHighlight error', e);
  }
}

async function countHTMLUNs(file) {
  const res = await fetch(BASE + file);
  const html = await res.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const divs = Array.from(doc.querySelectorAll('div.iataPara'));
  const text = divs.map(d => d.textContent).join(' ');
  return { uns: extractUNs(text), paraCount: divs.length };
}

// ─── JSON PARAGRAPHS ─────────────────────────────────────
function renderJsonItem(item, label, nested = false) {
  const lines = Array.isArray(item.texto) ? item.texto : [String(item.texto || '')];
  const hasUn = Array.isArray(item.un) && item.un.length;
  const unFieldHtml = hasUn
    ? `<div class="un-field-label">campo <code>un</code>:
         <span class="un-list">${item.un.map(u => `<span class="un-field-tag">UN ${escH(u)}</span>`).join('')}</span>
       </div>`
    : '';
  const hasUnCls = hasUn ? ' has-un-field' : '';
  const nestedCls = nested ? ' para-nested' : '';

  // All texto lines rendered at the SAME level (no parent/child).
  // Label: first line uses `label`, next ones `label.1`, `label.2`, …
  const linesHtml = lines.map((ln, j) => {
    const lbl = j === 0 ? label : `${label}.${j}`;
    return `<div class="para-line"><span class="para-idx">${lbl}</span>${highlightUN(ln)}</div>`;
  }).join('');

  // Explicit nested items (sección condicional)
  const nestedHtml = Array.isArray(item.items) && item.items.length
    ? `<div class="nested-items">${item.items.map((s, j) => renderJsonItem(s, `${label}.i${j+1}`, true)).join('')}</div>`
    : '';

  // campo un: appears AFTER every line of the group (at the bottom)
  return `<div class="para-block para-json${hasUnCls}${nestedCls}">
    ${linesHtml}${nestedHtml}${unFieldHtml}
  </div>`;
}

function jsonParasToRendered(entry) {
  if (!Array.isArray(entry) || !entry.length) {
    return '<div class="placeholder-msg">Sin instrucciones en JSON</div>';
  }
  return entry.map((item, i) => renderJsonItem(item, String(i+1))).join('');
}

// ─── SELECT PI ───────────────────────────────────────────
async function selectPI(file, pi) {
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.file-item[data-pi="${pi}"]`);
  if (el) el.classList.add('active');

  const htmlBody = document.getElementById('htmlBody');
  const jsonBody = document.getElementById('jsonBody');
  const htmlIssues = document.getElementById('htmlIssues');
  const jsonIssues = document.getElementById('jsonIssues');

  // HTML panel — load PI PDF into iframe (browser PDF viewer)
  htmlBody.innerHTML = '<div class="placeholder-msg" style="padding:3rem 1rem;">Cargando…</div>';
  const pdfUrl = `${PDF_BASE}${pi}.pdf`;
  document.getElementById('htmlLabel').textContent = `${pi}.pdf`;
  let htmlUns = new Set();
  try {
    const stats = await countHTMLUNs(file); // still parse HTML just to know UN count for diff
    htmlUns = stats.uns;
    htmlIssues.innerHTML = `<div class="issue-bar ok-bar">PDF del PI · ${htmlUns.size} UN distintos en fuente original</div>`;

    const iframe = document.createElement('iframe');
    // #search=UN hace que el visor de PDF de Chrome/Edge resalte todas las apariciones de "UN"
    iframe.src = pdfUrl + '#search=UN';
    htmlBody.innerHTML = '';
    htmlBody.appendChild(iframe);
  } catch(err) {
    htmlIssues.innerHTML = `<div class="issue-bar fail-bar">Error: ${escH(err.message || err)}</div>`;
    htmlBody.innerHTML = `<div class="placeholder-msg" style="padding:3rem 1rem;">Error cargando PDF</div>`;
  }

  // JSON panel
  const entry = instrMap[pi];
  if (!entry) {
    jsonIssues.innerHTML = `<div class="issue-bar warn-bar">No existe en JSON</div>`;
    jsonBody.innerHTML = '<div class="placeholder-msg">No existe en JSON</div>';
    document.getElementById('jsonLabel').textContent = '';
    return;
  }
  const s = piStats[pi] || analyzePI(pi);
  document.getElementById('jsonLabel').textContent = `${entry.length} items · ${s.jsonUns.size} UN`;

  // Diff UNs
  const htmlOnly = [...htmlUns].filter(u => !s.jsonUns.has(u)).sort();
  const jsonOnly = [...s.jsonUns].filter(u => !htmlUns.has(u)).sort();
  let diffBar;
  if (htmlOnly.length === 0 && jsonOnly.length === 0) {
    diffBar = `<div class="issue-bar ok-bar">UNs HTML y JSON coinciden (${s.jsonUns.size})</div>`;
  } else {
    const parts = [];
    if (jsonOnly.length) parts.push(`solo JSON: ${jsonOnly.map(u=>`UN ${u}`).join(', ')}`);
    if (htmlOnly.length) parts.push(`solo HTML: ${htmlOnly.map(u=>`UN ${u}`).join(', ')}`);
    diffBar = `<div class="issue-bar warn-bar">${parts.join(' · ')}</div>`;
  }
  jsonIssues.innerHTML = diffBar;
  jsonBody.innerHTML = jsonParasToRendered(entry);
}

// ─── EVENTS ──────────────────────────────────────────────
document.getElementById('fileList').addEventListener('click', e => {
  const folder = e.target.closest('.folder-item');
  if (folder && !document.getElementById('searchInput').value.trim() && activeFilter === 'all') {
    const name = folder.dataset.folder;
    const fd = document.getElementById('fileList').querySelector(`.folder-files[data-folder="${name}"]`);
    if (fd) { folder.classList.toggle('open'); fd.classList.toggle('open'); }
    return;
  }
  const item = e.target.closest('.file-item');
  if (!item) return;
  selectPI(item.dataset.file, item.dataset.pi);
});

document.getElementById('searchInput').addEventListener('input', function() { renderTree(this.value.trim()); });
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const first = document.getElementById('fileList').querySelector('.file-item');
    if (first) selectPI(first.dataset.file, first.dataset.pi);
  }
});

document.getElementById('filterWrap').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderTree(document.getElementById('searchInput').value.trim());
});

// Resizable divider (vertical stack)
const divider = document.getElementById('divider');
let dragging = false;
divider.addEventListener('mousedown', () => { dragging = true; document.body.style.cursor = 'row-resize'; });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r = document.getElementById('main').getBoundingClientRect();
  const pct = ((e.clientY - r.top) / r.height) * 100;
  if (pct > 15 && pct < 85) {
    document.getElementById('htmlPanel').style.flex = `0 0 ${pct}%`;
    document.getElementById('jsonPanel').style.flex = `0 0 ${100 - pct}%`;
  }
});
document.addEventListener('mouseup', () => { dragging = false; document.body.style.cursor = ''; });

// ─── INIT ────────────────────────────────────────────────
async function init() {
  document.getElementById('count').textContent = 'Cargando…';
  instrMap = await fetch('instrucciones_embalaje.json').then(r => r.json());
  for (const files of Object.values(TREE)) {
    for (const f of files) {
      const pi = getName(f);
      piStats[pi] = analyzePI(pi);
    }
  }
  updateSummary();
  renderTree();
}
init();
</script>
