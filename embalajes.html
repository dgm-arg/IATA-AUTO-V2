<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embalajes - Buscador</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <style>
    body { background: #f5f5f5; font-family: Verdana, sans-serif; }
    .search-box { max-width: 500px; margin: 0 auto; }
    .file-list { max-height: 80vh; overflow-y: auto; }
    .folder-item { cursor: pointer; padding: 8px 12px; border-bottom: 1px solid #eee; font-family: Verdana, sans-serif; font-size: 14px; font-weight: bold; background: #f8f9fa; }
    .folder-item:hover { background: #dee2e6; }
    .folder-item.open { background: #e2e6ea; }
    .file-item { cursor: pointer; padding: 6px 12px 6px 28px; border-bottom: 1px solid #eee; font-family: Verdana, sans-serif; font-size: 14px; }
    .file-item:hover { background: #e9ecef; }
    .file-item.active { background: #0d6efd; color: #fff; }
    .folder-files { display: none; }
    .folder-files.open { display: block; }
    iframe { width: 100%; height: 85vh; border: 1px solid #ccc; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="container-fluid py-3">
    <div class="row">
      <div class="col-md-3">
        <h5 class="mb-3">Instrucciones de Embalaje</h5>
        <div class="search-box mb-3">
          <input type="text" class="form-control" id="searchInput" placeholder="Buscar PI (ej: 200, Y203, 965...)">
        </div>
        <div class="mb-3 d-flex gap-2">
          <button class="btn btn-sm btn-primary flex-fill active" id="btnHTML" data-mode="html">HTML</button>
          <button class="btn btn-sm btn-outline-secondary flex-fill" id="btnPDF" data-mode="pdf">PDF</button>
        </div>
        <div class="file-list border rounded bg-white" id="fileList"></div>
        <p class="text-muted small mt-2" id="count"></p>
      </div>
      <div class="col-md-9">
        <iframe id="viewer" src="about:blank"></iframe>
      </div>
    </div>
  </div>

<script>
const TREE = {
  "Clase 1 - Explosivos": [
    "1/101.html","1/114.html","1/130.html","1/131.html","1/133.html","1/134.html","1/135.html","1/136.html","1/137.html","1/138.html","1/139.html","1/140.html","1/141.html","1/142.html","1/143.html"
  ],
  "Clase 2 - Gases": [
    "2/200.html","2/201.html","2/202.html","2/203.html","2/206.html","2/208.html","2/211.html","2/213.html","2/214.html","2/215.html","2/216.html","2/217.html","2/218.html","2/219.html","2/220.html","2/222.html","2/Y203.html","2/Y215.html"
  ],
  "Clase 3 - Liquidos inflamables": [
    "3/350.html","3/351.html","3/352.html","3/353.html","3/354.html","3/355.html","3/360.html","3/361.html","3/362.html","3/363.html","3/364.html","3/365.html","3/366.html","3/370.html","3/371.html","3/372.html","3/373.html","3/374.html","3/375.html","3/376.html","3/377.html","3/378.html","3/Y340.html","3/Y341.html","3/Y342.html","3/Y343.html","3/Y344.html","3/Y370.html","3/Y373.html","3/Y374.html"
  ],
  "Clase 4 - Solidos inflamables": [
    "4/445.html","4/446.html","4/448.html","4/449.html","4/450.html","4/451.html","4/452.html","4/453.html","4/454.html","4/455.html","4/456.html","4/457.html","4/458.html","4/459.html","4/462.html","4/463.html","4/464.html","4/465.html","4/466.html","4/467.html","4/468.html","4/469.html","4/470.html","4/471.html","4/472.html","4/473.html","4/478.html","4/479.html","4/480.html","4/481.html","4/482.html","4/483.html","4/484.html","4/485.html","4/486.html","4/487.html","4/489.html","4/490.html","4/491.html","4/492.html","4/493.html","4/494.html","4/495.html","4/496.html","4/497.html","4/499.html","4/Y440.html","4/Y441.html","4/Y442.html","4/Y443.html","4/Y450.html","4/Y454.html","4/Y455.html","4/Y457.html","4/Y458.html","4/Y474.html","4/Y475.html","4/Y476.html","4/Y477.html","4/Y495.html"
  ],
  "Clase 5 - Comburentes y peroxidos": [
    "5/550.html","5/551.html","5/553.html","5/554.html","5/555.html","5/557.html","5/558.html","5/559.html","5/561.html","5/562.html","5/563.html","5/565.html","5/570.html","5/Y540.html","5/Y541.html","5/Y543.html","5/Y544.html","5/Y545.html","5/Y546.html"
  ],
  "Clase 6 - Toxicos e infecciosos": [
    "6/603.html","6/620.html","6/621.html","6/650.html","6/651.html","6/652.html","6/653.html","6/654.html","6/655.html","6/657.html","6/658.html","6/659.html","6/660.html","6/661.html","6/662.html","6/663.html","6/665.html","6/666.html","6/667.html","6/668.html","6/669.html","6/670.html","6/672.html","6/673.html","6/674.html","6/675.html","6/676.html","6/677.html","6/679.html","6/680.html","6/681.html","6/699.html","6/Y640.html","6/Y641.html","6/Y642.html","6/Y644.html","6/Y645.html","6/Y680.html"
  ],
  "Clase 8 - Corrosivos": [
    "8/850.html","8/851.html","8/852.html","8/854.html","8/855.html","8/856.html","8/858.html","8/859.html","8/860.html","8/862.html","8/863.html","8/864.html","8/866.html","8/867.html","8/868.html","8/869.html","8/870.html","8/871.html","8/872.html","8/873.html","8/874.html","8/875.html","8/876.html","8/Y840.html","8/Y841.html","8/Y843.html","8/Y844.html","8/Y845.html","8/Y873.html"
  ],
  "Clase 9 - Miscelaneas": [
    "9/950.html","9/951.html","9/952.html","9/953.html","9/954.html","9/955.html","9/956.html","9/957.html","9/958.html","9/959.html","9/960.html","9/961.html","9/962.html","9/964.html","9/965.html","9/966.html","9/967.html","9/968.html","9/969.html","9/970.html","9/971.html","9/972.html","9/975.html","9/976.html","9/977.html","9/978.html","9/Y956.html","9/Y958.html","9/Y960.html","9/Y963.html","9/Y964.html"
  ]
}

const BASES = { html: '0-RAW/embalajes/', pdf: 'PDF/PI/' }
let viewMode = 'html'
const listEl = document.getElementById('fileList')
const countEl = document.getElementById('count')
const searchEl = document.getElementById('searchInput')
const viewer = document.getElementById('viewer')

function getName(f) { return f.split('/').pop().replace('.html', '') }

function renderTree() {
  let html = ''
  for (const [folder, files] of Object.entries(TREE)) {
    html += `<div class="folder-item" data-folder="${folder}">${folder} (${files.length})</div>`
    html += `<div class="folder-files" data-folder="${folder}">`
    for (const f of files) {
      html += `<div class="file-item" data-file="${f}">${getName(f)}</div>`
    }
    html += `</div>`
  }
  listEl.innerHTML = html
  const total = Object.values(TREE).reduce((s, a) => s + a.length, 0)
  countEl.textContent = `${total} archivos en ${Object.keys(TREE).length} clases`
}

function renderSearch(q) {
  q = q.toUpperCase()
  let html = ''
  let count = 0
  for (const [folder, files] of Object.entries(TREE)) {
    const matched = files.filter(f => getName(f).toUpperCase().includes(q))
    if (matched.length === 0) continue
    html += `<div class="folder-item" style="pointer-events:none;">${folder} (${matched.length})</div>`
    for (const f of matched) {
      html += `<div class="file-item" data-file="${f}">${getName(f)}</div>`
      count++
    }
  }
  listEl.innerHTML = html
  countEl.textContent = `${count} resultados`
}

listEl.addEventListener('click', e => {
  // Folder click
  const folder = e.target.closest('.folder-item')
  if (folder && !searchEl.value.trim()) {
    const name = folder.dataset.folder
    const filesDiv = listEl.querySelector(`.folder-files[data-folder="${name}"]`)
    if (filesDiv) {
      folder.classList.toggle('open')
      filesDiv.classList.toggle('open')
    }
    return
  }

  // File click
  const item = e.target.closest('.file-item')
  if (!item) return
  listEl.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'))
  item.classList.add('active')
  const f = item.dataset.file
  if (viewMode === 'pdf') {
    viewer.src = BASES.pdf + getName(f) + '.pdf'
  } else {
    viewer.src = BASES.html + f
  }
})

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim()
  if (q) renderSearch(q)
  else renderTree()
})

searchEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const first = listEl.querySelector('.file-item')
    if (first) first.click()
  }
})

// Mode toggle
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    viewMode = btn.dataset.mode
    document.getElementById('btnHTML').className = 'btn btn-sm flex-fill ' + (viewMode === 'html' ? 'btn-primary active' : 'btn-outline-secondary')
    document.getElementById('btnPDF').className = 'btn btn-sm flex-fill ' + (viewMode === 'pdf' ? 'btn-primary active' : 'btn-outline-secondary')
    const active = listEl.querySelector('.file-item.active')
    if (active) active.click()
  })
})

renderTree()
</script>
</body>
</html>
