<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Check — HTML vs JSON</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <style>
    body { background: #f5f5f5; font-family: Verdana, sans-serif; font-size: 0.78rem; margin: 0; }

    /* Summary bar */
    #summaryBar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; background: #212529; color: #fff;
      padding: 5px 16px 5px 220px; display: flex; gap: 18px; align-items: center; font-size: 0.78rem; height: 32px; }
    .sum-badge { padding: 1px 10px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
    .sum-pass { background: #198754; }
    .sum-fail { background: #dc3545; }
    .sum-skip { background: #6c757d; }

    /* Sidebar */
    #sidebar { width: 210px; position: fixed; top: 32px; left: 0; bottom: 0; background: #fff; border-right: 1px solid #ccc;
      display: flex; flex-direction: column; z-index: 10; }
    #sidebar h6 { padding: 8px 10px 0; margin: 0; font-size: 0.8rem; }
    #searchWrap { padding: 5px 10px; }
    #searchWrap input { font-size: 0.78rem; }
    #filterWrap { padding: 0 10px 4px; display: flex; gap: 4px; }
    .filter-btn { font-size: 0.65rem; padding: 1px 6px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: #fff; }
    .filter-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    #fileList { flex: 1; overflow-y: auto; }
    .folder-item { cursor: pointer; padding: 5px 10px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 0.72rem; background: #f8f9fa; }
    .folder-item:hover { background: #dee2e6; }
    .folder-files { display: none; }
    .folder-files.open { display: block; }
    .file-item { cursor: pointer; padding: 3px 10px 3px 18px; border-bottom: 1px solid #f0f0f0; font-size: 0.76rem; display: flex; justify-content: space-between; align-items: center; }
    .file-item:hover { background: #e9ecef; }
    .file-item.active { background: #0d6efd; color: #fff; }
    .file-item.active .b-fail, .file-item.active .b-ok, .file-item.active .b-skip { opacity: 0.9; }
    .b-fail { background: #dc3545; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; }
    .b-ok   { background: #198754; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; }
    .b-skip { background: #6c757d; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; }
    #count { padding: 4px 10px; font-size: 0.68rem; color: #888; border-top: 1px solid #eee; }

    /* Main */
    #main { margin-left: 210px; margin-top: 32px; display: flex; height: calc(100vh - 32px); }
    .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .panel-header { background: #343a40; color: #fff; padding: 5px 10px; font-weight: bold; font-size: 0.78rem;
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .panel-header small { font-weight: normal; opacity: 0.7; }
    .panel-body { flex: 1; overflow-y: auto; background: #fff; padding: 8px; }
    .divider { width: 4px; background: #6c757d; cursor: col-resize; flex-shrink: 0; }
    .divider:hover { background: #0d6efd; }

    /* Tables in both panels */
    .tabla-block { margin-bottom: 18px; }
    .tabla-label { font-weight: bold; font-size: 0.76rem; padding: 3px 8px; border-radius: 4px 4px 0 0; border: 1px solid #ccc; border-bottom: none; }
    .tabla-label.html-label { background: #cfe2ff; }
    .tabla-label.json-label { background: #e9ecef; }
    .tabla-label.warn { background: #fff3cd; }
    .tabla-meta { font-size: 0.65rem; color: #6c757d; padding: 2px 8px; border: 1px solid #ccc; border-top: none; background: #fafafa; border-radius: 0 0 4px 4px; }
    .tabla-block table { font-size: 0.70rem; margin: 0; }
    .tabla-block th { background: #343a40; color: #fff; white-space: nowrap; }
    .tabla-block th.dup { background: #dc3545; }
    .tabla-block td { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tabla-block td.empty-row { background: #fff3cd; }
    .tabla-block td.has-nl { background: #cfe2ff; }

    /* Issue bar per PI */
    .issue-bar { padding: 5px 8px; border-bottom: 1px solid #ddd; font-size: 0.7rem; flex-shrink: 0; }
    .issue-bar.ok-bar { background: #d1e7dd; }
    .issue-bar.fail-bar { background: #fff3cd; }
    .itag { display: inline-block; margin: 1px 2px; padding: 0 5px; border-radius: 3px; font-size: 0.65rem; }
    .itag.f { background: #dc3545; color: #fff; }
    .itag.w { background: #fd7e14; color: #fff; }
    .itag.p { background: #198754; color: #fff; }

    .placeholder-msg { color: #aaa; text-align: center; padding: 3rem 1rem; }
  </style>
</head>
<body>

<!-- Summary bar -->
<div id="summaryBar">
  <strong>Import Check</strong>
  <span class="sum-badge sum-pass" id="sumPass">PASS 0</span>
  <span class="sum-badge sum-fail" id="sumFail">FAIL 0</span>
  <span class="sum-badge sum-skip" id="sumSkip">SKIP 0</span>
  <span style="opacity:0.5" id="sumTotal"></span>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="searchWrap"><input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Buscar PI…"></div>
  <div id="filterWrap">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="fail">Fail</button>
    <button class="filter-btn" data-filter="pass">Pass</button>
    <button class="filter-btn" data-filter="skip">Skip</button>
  </div>
  <div id="fileList"></div>
  <div id="count"></div>
</div>

<!-- Main split panels -->
<div id="main">
  <div class="panel" id="htmlPanel">
    <div class="panel-header">HTML Original <small id="htmlLabel"></small></div>
    <div id="htmlIssues"></div>
    <div class="panel-body" id="htmlBody"><div class="placeholder-msg">Elegir un PI a la izquierda</div></div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="panel" id="jsonPanel">
    <div class="panel-header">JSON Importado <small id="jsonLabel"></small></div>
    <div id="jsonIssues"></div>
    <div class="panel-body" id="jsonBody"><div class="placeholder-msg">Elegir un PI a la izquierda</div></div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────
let tablaMap = {};
let piIssues = {};
let activeFilter = 'all';

const TREE = {
  "Clase 1 - Explosivos":["1/101.html","1/114.html","1/130.html","1/131.html","1/133.html","1/134.html","1/135.html","1/136.html","1/137.html","1/138.html","1/139.html","1/140.html","1/141.html","1/142.html","1/143.html"],
  "Clase 2 - Gases":["2/200.html","2/201.html","2/202.html","2/203.html","2/206.html","2/208.html","2/211.html","2/213.html","2/214.html","2/215.html","2/216.html","2/217.html","2/218.html","2/219.html","2/220.html","2/222.html","2/Y203.html","2/Y215.html"],
  "Clase 3 - Liquidos":["3/350.html","3/351.html","3/352.html","3/353.html","3/354.html","3/355.html","3/360.html","3/361.html","3/362.html","3/363.html","3/364.html","3/365.html","3/366.html","3/370.html","3/371.html","3/372.html","3/373.html","3/374.html","3/375.html","3/376.html","3/377.html","3/378.html","3/Y340.html","3/Y341.html","3/Y342.html","3/Y343.html","3/Y344.html","3/Y370.html","3/Y373.html","3/Y374.html"],
  "Clase 4 - Solidos":["4/445.html","4/446.html","4/448.html","4/449.html","4/450.html","4/451.html","4/452.html","4/453.html","4/454.html","4/455.html","4/456.html","4/457.html","4/458.html","4/459.html","4/462.html","4/463.html","4/464.html","4/465.html","4/466.html","4/467.html","4/468.html","4/469.html","4/470.html","4/471.html","4/472.html","4/473.html","4/478.html","4/479.html","4/480.html","4/481.html","4/482.html","4/483.html","4/484.html","4/485.html","4/486.html","4/487.html","4/489.html","4/490.html","4/491.html","4/492.html","4/493.html","4/494.html","4/495.html","4/496.html","4/497.html","4/499.html","4/Y440.html","4/Y441.html","4/Y442.html","4/Y443.html","4/Y450.html","4/Y454.html","4/Y455.html","4/Y457.html","4/Y458.html","4/Y474.html","4/Y475.html","4/Y476.html","4/Y477.html","4/Y495.html"],
  "Clase 5 - Comburentes":["5/550.html","5/551.html","5/553.html","5/554.html","5/555.html","5/557.html","5/558.html","5/559.html","5/561.html","5/562.html","5/563.html","5/565.html","5/570.html","5/Y540.html","5/Y541.html","5/Y543.html","5/Y544.html","5/Y545.html","5/Y546.html"],
  "Clase 6 - Toxicos":["6/603.html","6/620.html","6/621.html","6/650.html","6/651.html","6/652.html","6/653.html","6/654.html","6/655.html","6/657.html","6/658.html","6/659.html","6/660.html","6/661.html","6/662.html","6/663.html","6/665.html","6/666.html","6/667.html","6/668.html","6/669.html","6/670.html","6/672.html","6/673.html","6/674.html","6/675.html","6/676.html","6/677.html","6/679.html","6/680.html","6/681.html","6/699.html","6/Y640.html","6/Y641.html","6/Y642.html","6/Y644.html","6/Y645.html","6/Y680.html"],
  "Clase 8 - Corrosivos":["8/850.html","8/851.html","8/852.html","8/854.html","8/855.html","8/856.html","8/858.html","8/859.html","8/860.html","8/862.html","8/863.html","8/864.html","8/866.html","8/867.html","8/868.html","8/869.html","8/870.html","8/871.html","8/872.html","8/873.html","8/874.html","8/875.html","8/876.html","8/Y840.html","8/Y841.html","8/Y843.html","8/Y844.html","8/Y845.html","8/Y873.html"],
  "Clase 9 - Miscelaneas":["9/950.html","9/951.html","9/952.html","9/953.html","9/954.html","9/955.html","9/956.html","9/957.html","9/958.html","9/959.html","9/960.html","9/961.html","9/962.html","9/964.html","9/965.html","9/966.html","9/967.html","9/968.html","9/969.html","9/970.html","9/971.html","9/972.html","9/975.html","9/976.html","9/977.html","9/978.html","9/Y956.html","9/Y958.html","9/Y960.html","9/Y963.html","9/Y964.html"]
};

const LEGIT_BASES = new Set([
  'Sacos','Recipientes','Bidones','Cajas','Jerricanes','Bolsas',
  'Bandejas provistas de paredes divisorias','Embalajes únicos',
  'Combinaciones','Contenedores intermedios','Hojas','Tubos',
  'Embalajes únicos (véase 6.5)'
]);

const BASE = '0-RAW/embalajes/';
function getName(f) { return f.split('/').pop().replace('.html',''); }
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── ISSUES ──────────────────────────────────────────────
// Modo estricto: reporta muchas clases de error de parseo/estructura.
// No se reportan (válido): título faltante, filas sin datos, tabla con 0 filas.
const BAD_STRINGS = new Set(['none','null','nan','undefined','—','-']);

function analyzePI(codigo) {
  const e = tablaMap[codigo];
  if (!e) return ['SKIP: no existe en JSON'];
  const issues = [];

  // ── Entry-level ──
  if (e.codigo === undefined || e.codigo === null || e.codigo === '')
    issues.push('codigo vacío/ausente');
  if (!Array.isArray(e.tablas))
    issues.push('tablas no es array');

  for (const [ti, t] of e.tablas.entries()) {
    const tag = `T${ti}`;
    const headers = t.encabezados || [];

    // ── Título ──
    if (t.titulo !== null && t.titulo !== undefined) {
      const tit = String(t.titulo);
      if (BAD_STRINGS.has(tit.toLowerCase().trim()))
        issues.push(`${tag} titulo "basura": ${tit}`);
      if (tit !== tit.trim())
        issues.push(`${tag} titulo con espacios al borde`);
      if (/[\n\t]/.test(tit))
        issues.push(`${tag} titulo con \\n o \\t`);
    }

    // ── Headers ──
    const headerCount = {};
    for (const col of headers) {
      const c = String(col);
      if (/_\d+$/.test(c) && !LEGIT_BASES.has(c.replace(/_\d+$/, '')))
        issues.push(`${tag} col duplicada: ${c}`);
      if (/^col_\d+$/.test(c))
        issues.push(`${tag} header genérico: ${c}`);
      if (c !== '' && c !== c.trim())
        issues.push(`${tag} header con espacios al borde: "${c}"`);
      if (/[\n\t]/.test(c))
        issues.push(`${tag} header con \\n o \\t: "${c}"`);
      if (c !== '' && BAD_STRINGS.has(c.toLowerCase().trim()))
        issues.push(`${tag} header "basura": "${c}"`);
      headerCount[c] = (headerCount[c] || 0) + 1;
    }
    for (const [h, n] of Object.entries(headerCount)) {
      if (n > 1 && h !== '')
        issues.push(`${tag} header repetido ${n}×: "${h}"`);
    }
    const headersSet = new Set(headers);

    // ── num_filas coherente ──
    if (Array.isArray(t.filas) && t.num_filas !== undefined && t.num_filas !== t.filas.length)
      issues.push(`${tag} num_filas=${t.num_filas} ≠ filas.length=${t.filas.length}`);

    // ── Filas ──
    const sawCellNL = { flag: false };
    for (const [ri, row] of (t.filas || []).entries()) {
      // Keys mismatch
      const rowKeys = Object.keys(row);
      for (const k of rowKeys) {
        if (!headersSet.has(k))
          issues.push(`${tag} fila ${ri} key huérfana: "${k}"`);
      }
      for (const h of headers) {
        if (!(h in row))
          issues.push(`${tag} fila ${ri} falta key: "${h}"`);
      }

      // Cell-level checks
      for (const [k, v] of Object.entries(row)) {
        if (v === null || v === undefined) continue;
        const s = String(v);
        if (!s) continue;
        if (s.includes('\n') || s.includes('\r')) {
          if (!sawCellNL.flag) { issues.push(`${tag} celda con \\n`); sawCellNL.flag = true; }
        }
        if (s.includes('\t'))
          issues.push(`${tag} fila ${ri} celda con \\t en "${k}"`);
        if (BAD_STRINGS.has(s.toLowerCase().trim()))
          issues.push(`${tag} fila ${ri} celda "basura" ("${s}") en "${k}"`);
        if (s !== s.trim())
          issues.push(`${tag} fila ${ri} celda con espacios al borde en "${k}"`);
        if (/[☞△►▶◆■]/.test(s))
          issues.push(`${tag} fila ${ri} celda con marcador (☞/△/etc) en "${k}"`);
        if (/\uFFFD/.test(s))
          issues.push(`${tag} fila ${ri} mojibake (U+FFFD) en "${k}"`);
        if (/[\u00A0\u2028\u2029]/.test(s))
          issues.push(`${tag} fila ${ri} whitespace raro (NBSP/LS/PS) en "${k}"`);
        // UN-col cells: múltiples UN mashed con texto entre medio (ej. "UN 1944, Fósforos... UN 1945, Fósforos...")
        // Listas legítimas tipo "UN 1724 , UN 1728 , UN 1747" pasan sin problema.
        if (/n[uú]mero(s)?\s+un\b/i.test(k) || /^un$/i.test(k)) {
          const uns = s.match(/UN\s*\d{3,4}/gi) || [];
          if (uns.length > 1) {
            // remove all UN tokens + separators; lo que queda es "texto entre medio"
            const leftover = s.replace(/UN\s*\d{3,4}/gi, '').replace(/[\s,;/·•]+/g, '').trim();
            if (leftover.length > 0)
              issues.push(`${tag} fila ${ri} múltiples UN mashed con texto en "${k}"`);
          }
        }
      }
    }

  }
  return issues;
}

function piStatus(pi) {
  const iss = piIssues[pi] || [];
  if (iss.some(i => i.startsWith('SKIP'))) return 'skip';
  return iss.length ? 'fail' : 'pass';
}

// ─── SUMMARY ─────────────────────────────────────────────
function updateSummary() {
  let pass=0, fail=0, skip=0;
  for (const files of Object.values(TREE)) {
    for (const f of files) {
      const s = piStatus(getName(f));
      if (s==='pass') pass++; else if (s==='fail') fail++; else skip++;
    }
  }
  document.getElementById('sumPass').textContent = `PASS ${pass}`;
  document.getElementById('sumFail').textContent = `FAIL ${fail}`;
  document.getElementById('sumSkip').textContent = `SKIP ${skip}`;
  document.getElementById('sumTotal').textContent = `${pass+fail+skip} PIs total`;
}

// ─── FILE LIST ───────────────────────────────────────────
function renderTree(filter) {
  const q = (filter || '').toUpperCase();
  let html = '', total = 0;
  for (const [folder, files] of Object.entries(TREE)) {
    let matched = q ? files.filter(f => getName(f).toUpperCase().includes(q)) : files;
    if (activeFilter !== 'all') matched = matched.filter(f => piStatus(getName(f)) === activeFilter);
    if (!matched.length) continue;
    html += `<div class="folder-item" data-folder="${folder}">${folder} (${matched.length})</div>`;
    html += `<div class="folder-files${q || activeFilter!=='all' ? ' open':''}" data-folder="${folder}">`;
    for (const f of matched) {
      const pi = getName(f);
      const st = piStatus(pi);
      const iss = piIssues[pi] || [];
      const bcls = st==='pass'?'b-ok':st==='fail'?'b-fail':'b-skip';
      const label = st==='pass'?'OK':st==='skip'?'SKIP':iss.length;
      html += `<div class="file-item" data-file="${f}" data-pi="${pi}"><span>${pi}</span><span class="${bcls}">${label}</span></div>`;
      total++;
    }
    html += '</div>';
  }
  document.getElementById('fileList').innerHTML = html;
  document.getElementById('count').textContent = total + ' PIs';
}

// ─── EXTRACT HTML TABLES ─────────────────────────────────
async function extractHTMLTables(file) {
  const res = await fetch(BASE + file);
  const html = await res.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const allTables = Array.from(doc.querySelectorAll('table'));
  // Skip nav table (first one, usually 1 row with ✈)
  return allTables.filter(t => t.rows.length > 1);
}

function htmlTableToRendered(table, idx) {
  // Get title from first row if it's a single-cell spanning row
  let title = '';
  const firstRow = table.rows[0];
  if (firstRow && firstRow.cells.length === 1) {
    title = firstRow.cells[0].textContent.trim();
  }

  // Count data rows and max cols
  let maxCols = 0;
  for (const row of Array.from(table.rows)) {
    let c = 0;
    for (const cell of Array.from(row.cells)) c += parseInt(cell.getAttribute('colspan') || 1);
    maxCols = Math.max(maxCols, c);
  }
  const dataRows = table.rows.length - (title ? 1 : 0);

  let out = `<div class="tabla-block">`;
  out += `<div class="tabla-label html-label">HTML Tabla ${idx}: ${escH(title || '(sin título)')}</div>`;

  // Render the table as-is, preserving structure including colspan/rowspan
  out += `<div class="table-responsive"><table class="table table-sm table-bordered mb-0">`;
  const startRow = title ? 1 : 0;
  for (let ri = startRow; ri < table.rows.length; ri++) {
    const row = table.rows[ri];
    const isHeader = ri === startRow; // first data row = header
    out += '<tr>';
    for (const cell of Array.from(row.cells)) {
      const tag = isHeader ? 'th' : 'td';
      const cs = cell.getAttribute('colspan');
      const rs = cell.getAttribute('rowspan');
      let attrs = '';
      if (cs && cs !== '1') attrs += ` colspan="${cs}"`;
      if (rs && rs !== '1') attrs += ` rowspan="${rs}"`;
      const text = cell.textContent.trim();
      out += `<${tag}${attrs} title="${escH(text)}">${escH(text.length > 60 ? text.slice(0,58)+'…' : text)}</${tag}>`;
    }
    out += '</tr>';
  }
  out += '</table></div>';
  out += `<div class="tabla-meta">${maxCols} cols · ${dataRows} filas (incl. header)</div>`;
  out += '</div>';
  return out;
}

// ─── JSON TABLE RENDER ───────────────────────────────────
function jsonTableToRendered(t, idx) {
  const hasTitle = t.titulo && t.titulo !== 'None';
  let out = `<div class="tabla-block">`;
  out += `<div class="tabla-label json-label">JSON Tabla ${idx}${hasTitle ? `: ${escH(t.titulo)}` : ''}</div>`;

  out += `<div class="table-responsive"><table class="table table-sm table-bordered mb-0"><thead><tr>`;
  for (const col of t.encabezados) {
    const isDup = /_\d+$/.test(col) && !LEGIT_BASES.has(col.replace(/_\d+$/,''));
    const isGen = /^col_\d+$/.test(col);
    const cls = (isDup||isGen) ? ' class="dup"' : '';
    out += `<th${cls} title="${escH(col)}">${escH(col.length>30?col.slice(0,28)+'…':col)}</th>`;
  }
  out += '</tr></thead><tbody>';

  const dc = t.encabezados.slice(1);
  for (const row of t.filas) {
    const allEmpty = dc.length > 0 && dc.every(c => !String(row[c]||'').trim());
    out += '<tr>';
    for (const col of t.encabezados) {
      const val = row[col] ?? '';
      let cls = '';
      if (allEmpty && col !== t.encabezados[0]) cls = 'empty-row';
      if (String(val).includes('\n')) cls += ' has-nl';
      const display = escH(String(val).replace(/\n/g,' ↵ '));
      out += `<td class="${cls}" title="${escH(val)}">${display || '&nbsp;'}</td>`;
    }
    out += '</tr>';
  }
  out += '</tbody></table></div>';
  out += `<div class="tabla-meta">${t.encabezados.length} cols · ${t.filas.length} filas</div>`;
  out += '</div>';
  return out;
}

// ─── SELECT PI ───────────────────────────────────────────
async function selectPI(file, pi) {
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.file-item[data-pi="${pi}"]`);
  if (el) el.classList.add('active');

  const htmlBody = document.getElementById('htmlBody');
  const jsonBody = document.getElementById('jsonBody');
  const htmlIssues = document.getElementById('htmlIssues');
  const jsonIssues = document.getElementById('jsonIssues');

  // Issues bar
  const issues = piIssues[pi] || [];
  if (issues.some(i => i.startsWith('SKIP'))) {
    jsonIssues.innerHTML = `<div class="issue-bar fail-bar"><span class="itag f">SKIP</span> No existe en JSON</div>`;
  } else if (issues.length) {
    jsonIssues.innerHTML = `<div class="issue-bar fail-bar">${issues.map(i => `<span class="itag ${i.includes('genéric')||i.includes('duplica')?'f':'w'}">${escH(i)}</span>`).join(' ')}</div>`;
  } else {
    jsonIssues.innerHTML = `<div class="issue-bar ok-bar"><span class="itag p">PASS</span> Sin problemas</div>`;
  }

  // HTML panel: extract tables
  htmlBody.innerHTML = '<div class="placeholder-msg">Cargando…</div>';
  document.getElementById('htmlLabel').textContent = file;
  try {
    const tables = await extractHTMLTables(file);
    htmlIssues.innerHTML = `<div class="issue-bar ok-bar">${tables.length} tablas extraídas del HTML</div>`;
    if (tables.length === 0) {
      htmlBody.innerHTML = '<div class="placeholder-msg">Sin tablas en HTML</div>';
    } else {
      htmlBody.innerHTML = tables.map((t,i) => htmlTableToRendered(t,i)).join('');
    }
  } catch(err) {
    htmlIssues.innerHTML = `<div class="issue-bar fail-bar"><span class="itag f">Error fetch</span></div>`;
    htmlBody.innerHTML = `<div class="placeholder-msg">Error: ${escH(err)}</div>`;
  }

  // JSON panel
  const e = tablaMap[pi];
  if (!e) {
    jsonBody.innerHTML = '<div class="placeholder-msg">No existe en JSON</div>';
    document.getElementById('jsonLabel').textContent = '';
    return;
  }
  document.getElementById('jsonLabel').textContent = `${e.tablas.length} tablas`;
  jsonBody.innerHTML = e.tablas.map((t,i) => jsonTableToRendered(t,i)).join('');
}

// ─── EVENTS ──────────────────────────────────────────────
document.getElementById('fileList').addEventListener('click', e => {
  const folder = e.target.closest('.folder-item');
  if (folder && !document.getElementById('searchInput').value.trim() && activeFilter === 'all') {
    const name = folder.dataset.folder;
    const fd = document.getElementById('fileList').querySelector(`.folder-files[data-folder="${name}"]`);
    if (fd) { folder.classList.toggle('open'); fd.classList.toggle('open'); }
    return;
  }
  const item = e.target.closest('.file-item');
  if (!item) return;
  selectPI(item.dataset.file, item.dataset.pi);
});

document.getElementById('searchInput').addEventListener('input', function() { renderTree(this.value.trim()); });
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const first = document.getElementById('fileList').querySelector('.file-item');
    if (first) selectPI(first.dataset.file, first.dataset.pi);
  }
});

// Filter buttons
document.getElementById('filterWrap').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderTree(document.getElementById('searchInput').value.trim());
});

// Resizable divider
const divider = document.getElementById('divider');
let dragging = false;
divider.addEventListener('mousedown', () => { dragging = true; document.body.style.cursor = 'col-resize'; });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const r = document.getElementById('main').getBoundingClientRect();
  const pct = ((e.clientX - r.left) / r.width) * 100;
  if (pct > 15 && pct < 85) {
    document.getElementById('htmlPanel').style.flex = `0 0 ${pct}%`;
    document.getElementById('jsonPanel').style.flex = `0 0 ${100 - pct}%`;
  }
});
document.addEventListener('mouseup', () => { dragging = false; document.body.style.cursor = ''; });

// ─── INIT ────────────────────────────────────────────────
async function init() {
  document.getElementById('count').textContent = 'Cargando…';
  const data = await fetch('embalajes_tabla_claude.json').then(r => r.json());
  tablaMap = Object.fromEntries(data.instrucciones_embalaje.map(e => [e.codigo, e]));

  for (const files of Object.values(TREE)) {
    for (const f of files) {
      const pi = getName(f);
      piIssues[pi] = analyzePI(pi);
    }
  }
  updateSummary();
  renderTree();
}
init();
</script>
