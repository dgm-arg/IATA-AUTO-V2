<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IATA-AUTO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <style>
    tr.selected td { background-color: #0d6efd !important; color: #fff !important; }
    tr.selected a { color: #fff !important; }
    tbody tr { cursor: pointer; }
  </style>
</head>
<body>
  <div class="container py-5">
    <h3 class="display-1 fw mb-5 text-center" style="letter-spacing: 2px;">IATA-AUTO</h3>

    <div class="d-flex justify-content-center mb-4">
      <div class="card p-4" style="width: 100%; max-width: 400px;">
        <label for="numInput" class="form-label text-muted">Enter a number</label>
        <div class="input-group">
          <input type="number" class="form-control form-control-lg" id="numInput" placeholder="0">
          <button class="btn btn-primary" id="searchBtn">Search</button>
        </div>
      </div>
    </div>

    <div id="results"></div>
    <div id="embalaje-detail"></div>
  </div>

  <script type="module" src="app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
