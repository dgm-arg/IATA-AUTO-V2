<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería — Etiquetas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <style>
    body { font-family: Verdana, sans-serif; }
    .img-card {
      display: inline-block;
      margin: 8px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      text-align: center;
      vertical-align: top;
      background: #fff;
    }
    .img-card img {
      max-height: 140px;
      max-width: 180px;
      display: block;
      margin: 0 auto 6px auto;
    }
    .img-card .fname {
      font-size: 0.75rem;
      color: #555;
      word-break: break-all;
      max-width: 180px;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3 py-1" style="font-size:0.8rem;">
    <a class="navbar-brand mb-0" href="index.html" style="font-size:0.9rem;">DGR-YA</a>
    <div class="d-flex gap-3">
      <a href="index.html" class="text-light">Inicio</a>
      <a href="table.html" class="text-light">Tabla PI</a>
      <a href="embalajes.html" class="text-light">Embalajes</a>
      <a href="tests.html" class="text-light">Tests</a>
    </div>
  </nav>

  <div class="container py-4">
    <h3 class="mb-4 text-center">Galería — Etiquetas</h3>
    <div id="gallery" class="text-center"></div>
  </div>

  <script>
    const FILES = [
      '1.png','1.1.png','1.2.png','1.3.png','1.4.png','1.5.png','1.6.png',
      '2.png','2.1.png','2.2.png','2.3.png',
      '3.png',
      '4.png','4.1.png','4.2.png','4.3.png',
      '5.1.png','5.2.png',
      '6.1.png','6.2.png',
      '7.png','7.1.png','7.2.png','7.3.png',
      '8.png',
      '9.png','9-litio.png',
      'Y.png',
      'alejada-del-calor.png',
      'cargounicamente.png',
      'criogenic.png',
      'fissible.png',
      'litio.png',
      'magentizado.png',
      'onus_etiquetas_especiales.png',
      'orientacion.png',
      'peligro-al-medio-ambiente.png',
      'radiactivo-bulto-exceptuado.png'
    ];

    const gallery = document.getElementById('gallery');
    gallery.innerHTML = FILES.map(f =>
      `<div class="img-card">
        <a href="Etiquetas/${f}" target="_blank"><img src="Etiquetas/${f}" alt="${f}"></a>
        <div class="fname">${f}</div>
      </div>`
    ).join('');
  </script>
</body>
</html>
