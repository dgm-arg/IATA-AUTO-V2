<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texto Faltante — HTML vs JSON</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
  <style>
    body { background: #f5f5f5; font-family: Verdana, sans-serif; font-size: 0.80rem; margin: 0; }

    /* Summary bar */
    #summaryBar { position: fixed; top: 0; left: 0; right: 0; z-index: 20; background: #212529; color: #fff;
      padding: 5px 16px 5px 220px; display: flex; gap: 18px; align-items: center; font-size: 0.78rem; height: 32px; }
    .sum-badge { padding: 1px 10px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }
    .sum-pass { background: #198754; }
    .sum-fail { background: #dc3545; }
    .sum-skip { background: #6c757d; }
    .legend { margin-left: auto; font-size: 0.7rem; opacity: 0.75; }

    /* Sidebar */
    #sidebar { width: 210px; position: fixed; top: 32px; left: 0; bottom: 0; background: #fff; border-right: 1px solid #ccc;
      display: flex; flex-direction: column; z-index: 10; }
    #searchWrap { padding: 5px 10px; }
    #searchWrap input { font-size: 0.78rem; }
    #filterWrap { padding: 0 10px 4px; display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn { font-size: 0.65rem; padding: 1px 6px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; background: #fff; }
    .filter-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    #fileList { flex: 1; overflow-y: auto; }
    .folder-item { cursor: pointer; padding: 5px 10px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 0.72rem; background: #f8f9fa; }
    .folder-item:hover { background: #dee2e6; }
    .folder-files { display: none; }
    .folder-files.open { display: block; }
    .file-item { cursor: pointer; padding: 3px 10px 3px 18px; border-bottom: 1px solid #f0f0f0; font-size: 0.76rem; display: flex; justify-content: space-between; align-items: center; }
    .file-item:hover { background: #e9ecef; }
    .file-item.active { background: #0d6efd; color: #fff; }
    .file-item.active .b-miss, .file-item.active .b-ok, .file-item.active .b-skip, .file-item.active .b-pend { opacity: 0.9; }
    .b-miss { background: #dc3545; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; font-weight: bold; }
    .b-ok   { background: #198754; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; }
    .b-skip { background: #6c757d; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; }
    .b-pend { background: #adb5bd; color: #fff; font-size: 0.6rem; border-radius: 3px; padding: 0 4px; }
    #count { padding: 4px 10px; font-size: 0.68rem; color: #888; border-top: 1px solid #eee; }
    #scanBar { padding: 4px 10px; font-size: 0.68rem; color: #555; border-top: 1px solid #eee; background: #fafafa; }

    /* Main */
    #main { margin-left: 210px; margin-top: 32px; display: flex; height: calc(100vh - 32px); }
    .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .panel-header { background: #343a40; color: #fff; padding: 5px 10px; font-weight: bold; font-size: 0.80rem;
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .panel-header small { font-weight: normal; opacity: 0.7; }
    .panel-body { flex: 1; overflow-y: auto; background: #fff; padding: 10px; }
    .divider { width: 4px; background: #6c757d; cursor: col-resize; flex-shrink: 0; }
    .divider:hover { background: #0d6efd; }

    /* Blocks */
    .chunk { margin-bottom: 8px; padding: 6px 10px; border-radius: 4px; line-height: 1.45; font-size: 0.78rem; }
    .chunk-ok { background: #f1f3f5; border-left: 4px solid #198754; }
    .chunk-missing { background: #f8d7da; border-left: 4px solid #dc3545; color: #58151c; }
    .chunk-short { background: #fafafa; border-left: 4px solid #ced4da; color: #888; font-size: 0.70rem; }
    .chunk-tag { display: inline-block; font-size: 0.60rem; color: #fff; padding: 1px 6px; border-radius: 8px; margin-right: 6px; font-weight: bold; vertical-align: middle; }
    .chunk-tag-ok { background: #198754; }
    .chunk-tag-missing { background: #dc3545; }
    .chunk-tag-short { background: #adb5bd; }
    .chunk-src { font-size: 0.60rem; color: #6c757d; font-family: Consolas, monospace; margin-left: 6px; }

    /* JSON rendering */
    .json-item { margin-bottom: 8px; padding: 6px 10px; border-radius: 4px; line-height: 1.45; font-size: 0.78rem;
      background: #e7f3ff; border-left: 4px solid #0d6efd; }
    .json-item.has-un-field { background: #fff4e6; border-left-color: #fd7e14; }
    .json-idx { display: inline-block; font-size: 0.62rem; color: #fff; background: #495057;
      padding: 1px 6px; border-radius: 10px; margin-right: 6px; font-weight: bold; vertical-align: middle; }
    .nested { margin-top: 6px; margin-left: 14px; border-left: 2px dashed #adb5bd; padding-left: 10px; }
    .un-field-label { font-size: 0.7rem; color: #6c757d; margin-top: 4px; }
    .un-tag { display: inline-block; background: #fd7e14; color: #fff; font-weight: bold; padding: 0 6px; border-radius: 3px; font-family: Consolas, monospace; font-size: 0.7rem; margin: 0 2px; }
    .tabla-block { margin-top: 10px; padding: 6px 10px; background: #f1f3f5; border-left: 4px solid #6c757d; border-radius: 4px; font-size: 0.72rem; }
    .tabla-block .tbl-title { font-weight: bold; margin-bottom: 4px; }

    /* Issue bar */
    .issue-bar { padding: 5px 10px; border-bottom: 1px solid #ddd; font-size: 0.72rem; flex-shrink: 0; }
    .issue-bar.ok-bar { background: #d1e7dd; }
    .issue-bar.warn-bar { background: #fff3cd; }
    .issue-bar.fail-bar { background: #f8d7da; }

    .placeholder-msg { color: #aaa; text-align: center; padding: 3rem 1rem; }
  </style>
</head>
<body>

<!-- Summary bar -->
<div id="summaryBar">
  <strong>Texto Faltante</strong>
  <span class="sum-badge sum-fail" id="sumMiss">FALTA 0</span>
  <span class="sum-badge sum-pass" id="sumOk">OK 0</span>
  <span class="sum-badge sum-skip" id="sumSkip">SKIP 0</span>
  <span class="sum-badge" style="background:#adb5bd" id="sumPend">PEND 0</span>
  <span style="opacity:0.5" id="sumTotal"></span>
  <span class="legend">
    <span class="chunk-tag chunk-tag-missing">FALTA</span> chunk ausente en JSON
    &nbsp;·&nbsp;
    <span class="chunk-tag chunk-tag-ok">OK</span> encontrado
  </span>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="searchWrap"><input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Buscar PI…"></div>
  <div id="filterWrap">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="miss">Falta</button>
    <button class="filter-btn" data-filter="ok">OK</button>
    <button class="filter-btn" data-filter="skip">Skip</button>
  </div>
  <div id="fileList"></div>
  <div id="scanBar"><button id="scanBtn" class="btn btn-sm btn-outline-primary" style="font-size:0.68rem;padding:2px 8px;">Escanear todos</button></div>
  <div id="count"></div>
</div>

<!-- Main split panels -->
<div id="main">
  <div class="panel" id="htmlPanel">
    <div class="panel-header">HTML original (chunks extraídos) <small id="htmlLabel"></small></div>
    <div id="htmlIssues"></div>
    <div class="panel-body" id="htmlBody"><div class="placeholder-msg">Elegir un PI</div></div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="panel" id="jsonPanel">
    <div class="panel-header">JSON instrucciones + tablas <small id="jsonLabel"></small></div>
    <div id="jsonIssues"></div>
    <div class="panel-body" id="jsonBody"><div class="placeholder-msg">Elegir un PI</div></div>
  </div>
</div>

<script>
// ─── CONSTANTS (estricto) ──────────────────────────────────
const MIN_TOKENS = 3;   // chunks con <3 tokens se consideran cortos (1-2 palabras no se evalúan)
const NGRAM = 4;        // n-gramas de 4 tokens
const MATCH_THRESHOLD = 0.85; // 85% de n-gramas deben aparecer en JSON para marcarse "ok"

const TREE = {
  "Clase 1 - Explosivos":["1/101.html","1/114.html","1/130.html","1/131.html","1/133.html","1/134.html","1/135.html","1/136.html","1/137.html","1/138.html","1/139.html","1/140.html","1/141.html","1/142.html","1/143.html"],
  "Clase 2 - Gases":["2/200.html","2/201.html","2/202.html","2/203.html","2/206.html","2/208.html","2/211.html","2/213.html","2/214.html","2/215.html","2/216.html","2/217.html","2/218.html","2/219.html","2/220.html","2/222.html","2/Y203.html","2/Y215.html"],
  "Clase 3 - Liquidos":["3/350.html","3/351.html","3/352.html","3/353.html","3/354.html","3/355.html","3/360.html","3/361.html","3/362.html","3/363.html","3/364.html","3/365.html","3/366.html","3/370.html","3/371.html","3/372.html","3/373.html","3/374.html","3/375.html","3/376.html","3/377.html","3/378.html","3/Y340.html","3/Y341.html","3/Y342.html","3/Y343.html","3/Y344.html","3/Y370.html","3/Y373.html","3/Y374.html"],
  "Clase 4 - Solidos":["4/445.html","4/446.html","4/448.html","4/449.html","4/450.html","4/451.html","4/452.html","4/453.html","4/454.html","4/455.html","4/456.html","4/457.html","4/458.html","4/459.html","4/462.html","4/463.html","4/464.html","4/465.html","4/466.html","4/467.html","4/468.html","4/469.html","4/470.html","4/471.html","4/472.html","4/473.html","4/478.html","4/479.html","4/480.html","4/481.html","4/482.html","4/483.html","4/484.html","4/485.html","4/486.html","4/487.html","4/489.html","4/490.html","4/491.html","4/492.html","4/493.html","4/494.html","4/495.html","4/496.html","4/497.html","4/499.html","4/Y440.html","4/Y441.html","4/Y442.html","4/Y443.html","4/Y450.html","4/Y454.html","4/Y455.html","4/Y457.html","4/Y458.html","4/Y474.html","4/Y475.html","4/Y476.html","4/Y477.html","4/Y495.html"],
  "Clase 5 - Comburentes":["5/550.html","5/551.html","5/553.html","5/554.html","5/555.html","5/557.html","5/558.html","5/559.html","5/561.html","5/562.html","5/563.html","5/565.html","5/570.html","5/Y540.html","5/Y541.html","5/Y543.html","5/Y544.html","5/Y545.html","5/Y546.html"],
  "Clase 6 - Toxicos":["6/603.html","6/620.html","6/621.html","6/650.html","6/651.html","6/652.html","6/653.html","6/654.html","6/655.html","6/657.html","6/658.html","6/659.html","6/660.html","6/661.html","6/662.html","6/663.html","6/665.html","6/666.html","6/667.html","6/668.html","6/669.html","6/670.html","6/672.html","6/673.html","6/674.html","6/675.html","6/676.html","6/677.html","6/679.html","6/680.html","6/681.html","6/699.html","6/Y640.html","6/Y641.html","6/Y642.html","6/Y644.html","6/Y645.html","6/Y680.html"],
  "Clase 8 - Corrosivos":["8/850.html","8/851.html","8/852.html","8/854.html","8/855.html","8/856.html","8/858.html","8/859.html","8/860.html","8/862.html","8/863.html","8/864.html","8/866.html","8/867.html","8/868.html","8/869.html","8/870.html","8/871.html","8/872.html","8/873.html","8/874.html","8/875.html","8/876.html","8/Y840.html","8/Y841.html","8/Y843.html","8/Y844.html","8/Y845.html","8/Y873.html"],
  "Clase 9 - Miscelaneas":["9/950.html","9/951.html","9/952.html","9/953.html","9/954.html","9/955.html","9/956.html","9/957.html","9/958.html","9/959.html","9/960.html","9/961.html","9/962.html","9/964.html","9/965.html","9/966.html","9/967.html","9/968.html","9/969.html","9/970.html","9/971.html","9/972.html","9/975.html","9/976.html","9/977.html","9/978.html","9/Y956.html","9/Y958.html","9/Y960.html","9/Y963.html","9/Y964.html"]
};

const BASE = '0-RAW/embalajes/';
let instrMap = {};
let tablaMap = {};
let piStats = {}; // pi -> { scanned, missingCount, totalChunks, jsonBlob? }
let activeFilter = 'all';
let openFolders = new Set(); // recordar folders expandidos
let activePI = null;         // recordar PI activo

function getName(f) { return f.split('/').pop().replace('.html',''); }
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── TEXT NORMALIZATION ───────────────────────────────────
function normalize(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/[\u00AD\u200B-\u200F\u2060\uFEFF]/g, '') // strip soft hyphens & zero-width chars (no space!)
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // strip diacritics
    .replace(/[^\w\s]/g, ' ')     // strip punctuation
    .replace(/\s+/g, ' ')
    .trim();
}

function tokens(s) {
  const n = normalize(s);
  return n ? n.split(' ') : [];
}

function ngrams(toks, k) {
  const out = [];
  for (let i = 0; i + k <= toks.length; i++) out.push(toks.slice(i, i+k).join(' '));
  return out;
}

// ─── JSON BLOB (all text from instrucciones + tablas) ────
function jsonBlobFor(pi) {
  const blob = [];
  const entry = instrMap[pi];
  if (Array.isArray(entry)) {
    const walk = (items) => {
      for (const it of items) {
        if (it.texto) {
          if (Array.isArray(it.texto)) blob.push(...it.texto);
          else blob.push(String(it.texto));
        }
        if (Array.isArray(it.items)) walk(it.items);
      }
    };
    walk(entry);
  }
  const tablaEntry = tablaMap[pi];
  if (tablaEntry && Array.isArray(tablaEntry.tablas)) {
    for (const t of tablaEntry.tablas) {
      if (t.titulo) blob.push(t.titulo);
      if (Array.isArray(t.encabezados)) blob.push(...t.encabezados);
      if (Array.isArray(t.filas)) {
        for (const r of t.filas) for (const v of Object.values(r)) if (v) blob.push(String(v));
      }
      if (Array.isArray(t.footers)) {
        for (const f of t.footers) if (f.texto) blob.push(f.texto);
      }
    }
  }
  return normalize(blob.join(' '));
}

// ─── HTML CHUNK EXTRACTION ────────────────────────────────
// Extract "interesting" text chunks from raw HTML. Returns [{src, text}].
function extractHtmlChunks(doc) {
  const out = [];
  // Class-intro table: first <table> usually has "✈ Instrucciones de Embalaje — Clase X". Skip.
  let firstTableSkipped = false;
  const seen = new Set();

  // Walk all relevant blocks in order.
  const selectors = [
    'div.iataPara',
    'div.iataNote',
    'div.iataList',
    'div.iataListItem',
    'li.iataListItem',
    'li',
    'div.iataTableFootNote',
    'div.iataTableTitle',
    'span.iataItalics',
    'span.iataitalic'
  ];
  // Use a broader walker: any text-bearing block inside an iata* class
  const nodes = Array.from(doc.querySelectorAll('*')).filter(el => {
    const cls = el.className || '';
    if (typeof cls !== 'string') return false;
    if (!/^iata|\biata/i.test(cls)) return false;
    // Only leaf-ish nodes: skip if it has an iata* child (to avoid duplication)
    if (Array.from(el.children).some(c => typeof c.className === 'string' && /\biata/.test(c.className))) {
      // allow iataNote / iataTableFootNote which may wrap content
      if (!/(iataNote|iataTableFootNote|iataPara)\b/.test(cls)) return false;
    }
    return true;
  });

  // Clases a ignorar completamente (chrome, títulos, variaciones)
  const SKIP_CLASSES = /iata(Variations|StateVariation|OperatorVariation|LOGOPI|PIClassNameFont|h1PI|PITitle|PINumber|ClassTable|ClassIntro|SubsectionTitle|BreadCrumb)/i;
  for (const el of nodes) {
    // Skip class-intro tables
    if (el.closest('table.iataClassTable, table.iataClassIntro, div.iataSubsectionTitle')) continue;
    // Skip nav/header/footer chrome
    if (el.closest('nav, header, footer, #dgrHeader, #dgrFooter, .dgrToolbar')) continue;
    // Skip chrome/titles/variaciones
    if (SKIP_CLASSES.test(el.className)) continue;
    if (el.closest('[class*="iataVariations"], [class*="StateVariation"], [class*="OperatorVariation"], [class*="iataLOGOPI"], [class*="iataPIClassNameFont"], [class*="iatah1PI"]')) continue;
    const txt = el.textContent.replace(/\s+/g, ' ').trim();
    if (!txt) continue;
    // Skip text patterns of chrome/titles
    if (/^VARIACIONES\s+DE\s+LOS\s+(ESTADOS|OPERADORES)\b/i.test(txt)) continue;
    if (/^INSTRUCCI[ÓO]N\s+DE\s+EMBALAJE\s+\w+\s*$/i.test(txt)) continue;
    if (/^[✈\s]*Instrucciones\s+de\s+Embalaje\s*[—\-–]\s*Clase\b/i.test(txt)) continue;
    if (/^[✈\s]+$/.test(txt)) continue;
    // Dedupe (avoid counting same para twice)
    if (seen.has(txt)) continue;
    seen.add(txt);
    const cls = el.className.match(/iata\w+/)?.[0] || 'iata';
    out.push({ src: cls, text: txt });
  }

  // Also table cells (td/th) outside of already-handled blocks:
  const cells = Array.from(doc.querySelectorAll('td, th'));
  for (const c of cells) {
    // Skip if inside first table and that table contains only the class intro text
    const tbl = c.closest('table');
    if (tbl) {
      const tblTxt = tbl.textContent;
      if (/✈\s*Instrucciones de Embalaje\s*—\s*Clase/.test(tblTxt) && tblTxt.length < 300) continue;
    }
    // Skip if inside chrome/variation wrappers
    if (c.closest('[class*="iataVariations"], [class*="StateVariation"], [class*="OperatorVariation"], [class*="iataLOGOPI"], [class*="iataPIClassNameFont"], [class*="iatah1PI"]')) continue;
    const txt = c.textContent.replace(/\s+/g, ' ').trim();
    if (!txt) continue;
    if (/^VARIACIONES\s+DE\s+LOS\s+(ESTADOS|OPERADORES)\b/i.test(txt)) continue;
    if (/^INSTRUCCI[ÓO]N\s+DE\s+EMBALAJE\s+\w+\s*$/i.test(txt)) continue;
    if (/^[✈\s]*Instrucciones\s+de\s+Embalaje\s*[—\-–]\s*Clase\b/i.test(txt)) continue;
    if (/^[✈\s]+$/.test(txt)) continue;
    if (seen.has(txt)) continue;
    seen.add(txt);
    out.push({ src: 'cell', text: txt });
  }
  return out;
}

// ─── DIFF: mark each chunk as ok / missing / short ────────
function evaluateChunks(chunks, jsonBlobNorm) {
  return chunks.map(c => {
    const norm = normalize(c.text);
    const toks = norm ? norm.split(' ') : [];
    if (toks.length < MIN_TOKENS) return { ...c, norm, status: 'short' };
    // Fast check: is the whole normalized chunk a substring of the blob?
    if (jsonBlobNorm.includes(norm)) return { ...c, norm, status: 'ok' };
    // Chunks too cortos para n-gramas (< NGRAM tokens): si no hubo substring, marcar missing
    if (toks.length < NGRAM) return { ...c, norm, status: 'missing', ratio: 0 };
    // N-gram overlap
    const grams = ngrams(toks, NGRAM);
    let hits = 0;
    for (const g of grams) if (jsonBlobNorm.includes(g)) hits++;
    const ratio = hits / grams.length;
    return { ...c, norm, status: ratio >= MATCH_THRESHOLD ? 'ok' : 'missing', ratio };
  });
}

// ─── PI STATS / CATEGORY ─────────────────────────────────
function piCategory(pi) {
  const s = piStats[pi];
  if (!instrMap[pi] && !tablaMap[pi]) return 'skip';
  if (!s || !s.scanned) return 'pend';
  return s.missingCount > 0 ? 'miss' : 'ok';
}

function updateSummary() {
  let miss=0, ok=0, skip=0, pend=0;
  for (const files of Object.values(TREE)) {
    for (const f of files) {
      const c = piCategory(getName(f));
      if (c==='miss') miss++;
      else if (c==='ok') ok++;
      else if (c==='skip') skip++;
      else pend++;
    }
  }
  document.getElementById('sumMiss').textContent = `FALTA ${miss}`;
  document.getElementById('sumOk').textContent = `OK ${ok}`;
  document.getElementById('sumSkip').textContent = `SKIP ${skip}`;
  document.getElementById('sumPend').textContent = `PEND ${pend}`;
  document.getElementById('sumTotal').textContent = `${miss+ok+skip+pend} PIs total`;
}

// ─── FILE LIST ───────────────────────────────────────────
function renderTree(filter) {
  const q = (filter || '').toUpperCase();
  const forceOpen = !!q || activeFilter !== 'all';
  let html = '', total = 0;
  for (const [folder, files] of Object.entries(TREE)) {
    let matched = q ? files.filter(f => getName(f).toUpperCase().includes(q)) : files;
    if (activeFilter !== 'all') matched = matched.filter(f => piCategory(getName(f)) === activeFilter);
    if (!matched.length) continue;
    const isOpen = forceOpen || openFolders.has(folder);
    html += `<div class="folder-item${isOpen ? ' open' : ''}" data-folder="${folder}">${folder} (${matched.length})</div>`;
    html += `<div class="folder-files${isOpen ? ' open' : ''}" data-folder="${folder}">`;
    for (const f of matched) {
      const pi = getName(f);
      const c = piCategory(pi);
      const s = piStats[pi];
      let badge;
      if (c === 'skip') badge = `<span class="b-skip">SKIP</span>`;
      else if (c === 'pend') badge = `<span class="b-pend">?</span>`;
      else if (c === 'miss') badge = `<span class="b-miss">${s.missingCount} falta</span>`;
      else badge = `<span class="b-ok">OK</span>`;
      const activeCls = (activePI === pi) ? ' active' : '';
      html += `<div class="file-item${activeCls}" data-file="${f}" data-pi="${pi}"><span>${pi}</span>${badge}</div>`;
      total++;
    }
    html += '</div>';
  }
  document.getElementById('fileList').innerHTML = html;
  document.getElementById('count').textContent = total + ' PIs';
}

// ─── RENDER JSON PANEL ───────────────────────────────────
function renderJsonItem(item, label, nested=false) {
  const lines = Array.isArray(item.texto) ? item.texto : [String(item.texto||'')];
  const head = lines[0] || '';
  const extra = lines.slice(1);
  const hasUn = Array.isArray(item.un) && item.un.length;
  const unLabel = hasUn ? `<div class="un-field-label">un: ${item.un.map(u=>`<span class="un-tag">UN ${escH(u)}</span>`).join('')}</div>` : '';
  const extraHtml = extra.map((ln,j) => `<div class="json-item${nested?' nested':''}"><span class="json-idx">${label}.${j+1}</span>${escH(ln)}</div>`).join('');
  const subItems = Array.isArray(item.items) && item.items.length
    ? item.items.map((s,j) => renderJsonItem(s, `${label}.${extra.length+j+1}`, true)).join('')
    : '';
  const sub = (extraHtml || subItems) ? `<div class="nested">${extraHtml}${subItems}</div>` : '';
  return `<div class="json-item${hasUn?' has-un-field':''}"><span class="json-idx">${label}</span>${escH(head)}${unLabel}${sub}</div>`;
}

function jsonToHtml(pi) {
  const entry = instrMap[pi];
  const parts = [];
  if (Array.isArray(entry) && entry.length) {
    parts.push('<h6 style="font-size:0.82rem;margin:0 0 6px 0;">Instrucciones</h6>');
    parts.push(entry.map((it,i)=>renderJsonItem(it, String(i+1))).join(''));
  }
  const tablaEntry = tablaMap[pi];
  if (tablaEntry && Array.isArray(tablaEntry.tablas) && tablaEntry.tablas.length) {
    parts.push('<h6 style="font-size:0.82rem;margin:10px 0 6px 0;">Tablas</h6>');
    for (const t of tablaEntry.tablas) {
      let inner = '';
      if (t.titulo) inner += `<div class="tbl-title">${escH(t.titulo)}</div>`;
      inner += `<div style="font-size:0.68rem;color:#666">encabezados: ${escH((t.encabezados||[]).join(' · '))}</div>`;
      inner += `<div style="font-size:0.68rem;color:#666">${(t.filas||[]).length} filas</div>`;
      if (Array.isArray(t.footers) && t.footers.length) {
        inner += `<div style="margin-top:4px;font-size:0.70rem"><b>Footers:</b> ${t.footers.map(f=>escH(f.texto)).join(' · ')}</div>`;
      }
      parts.push(`<div class="tabla-block">${inner}</div>`);
    }
  }
  if (!parts.length) return '<div class="placeholder-msg">Sin instrucciones ni tablas en JSON</div>';
  return parts.join('');
}

// ─── SCAN ONE PI ─────────────────────────────────────────
async function scanPI(pi, file) {
  if (!instrMap[pi] && !tablaMap[pi]) {
    piStats[pi] = { scanned: true, missingCount: 0, totalChunks: 0, chunks: [] };
    return piStats[pi];
  }
  try {
    const res = await fetch(BASE + file);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const chunks = extractHtmlChunks(doc);
    const blob = jsonBlobFor(pi);
    const evald = evaluateChunks(chunks, blob);
    const missingCount = evald.filter(c => c.status === 'missing').length;
    piStats[pi] = { scanned: true, missingCount, totalChunks: evald.length, chunks: evald };
    return piStats[pi];
  } catch (err) {
    console.warn('scanPI error', pi, err);
    piStats[pi] = { scanned: true, missingCount: 0, totalChunks: 0, chunks: [], error: String(err.message||err) };
    return piStats[pi];
  }
}

// ─── SELECT PI ───────────────────────────────────────────
async function selectPI(file, pi) {
  activePI = pi;
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.file-item[data-pi="${pi}"]`);
  if (el) el.classList.add('active');

  const htmlBody = document.getElementById('htmlBody');
  const jsonBody = document.getElementById('jsonBody');
  const htmlIssues = document.getElementById('htmlIssues');
  const jsonIssues = document.getElementById('jsonIssues');
  document.getElementById('htmlLabel').textContent = `${pi}.html`;
  document.getElementById('jsonLabel').textContent = pi;

  htmlBody.innerHTML = '<div class="placeholder-msg">Analizando…</div>';
  jsonBody.innerHTML = '<div class="placeholder-msg">Cargando…</div>';
  jsonIssues.innerHTML = '';
  htmlIssues.innerHTML = '';

  const stats = await scanPI(pi, file);

  // JSON panel
  jsonBody.innerHTML = jsonToHtml(pi);
  const entry = instrMap[pi];
  const tablaEntry = tablaMap[pi];
  if (!entry && !tablaEntry) {
    jsonIssues.innerHTML = `<div class="issue-bar warn-bar">No existe en JSON</div>`;
  } else {
    const instrCount = Array.isArray(entry) ? entry.length : 0;
    const tablaCount = tablaEntry?.tablas?.length || 0;
    jsonIssues.innerHTML = `<div class="issue-bar ok-bar">${instrCount} items · ${tablaCount} tablas</div>`;
  }

  // HTML panel
  if (stats.error) {
    htmlIssues.innerHTML = `<div class="issue-bar fail-bar">Error: ${escH(stats.error)}</div>`;
    htmlBody.innerHTML = '<div class="placeholder-msg">No se pudo cargar el HTML</div>';
    return;
  }

  const miss = stats.missingCount;
  const total = stats.totalChunks;
  const cls = miss ? 'fail-bar' : 'ok-bar';
  htmlIssues.innerHTML = `<div class="issue-bar ${cls}">${total} chunks · <b>${miss}</b> faltantes en JSON</div>`;

  // Ordenar: FALTA primero, luego OK, luego short
  const order = { missing: 0, ok: 1, short: 2 };
  const sorted = stats.chunks.map((c, i) => ({ ...c, origIdx: i })).sort((a, b) => {
    const d = (order[a.status] ?? 9) - (order[b.status] ?? 9);
    return d !== 0 ? d : a.origIdx - b.origIdx;
  });

  const missingChunks = sorted.filter(c => c.status === 'missing');
  const okChunks = sorted.filter(c => c.status === 'ok');
  const shortChunks = sorted.filter(c => c.status === 'short');

  const renderChunk = (c) => {
    if (c.status === 'ok') {
      return `<div class="chunk chunk-ok"><span class="chunk-tag chunk-tag-ok">OK</span><span class="chunk-src">${escH(c.src)}</span><br>${escH(c.text)}</div>`;
    } else if (c.status === 'short') {
      return `<div class="chunk chunk-short"><span class="chunk-tag chunk-tag-short">short</span><span class="chunk-src">${escH(c.src)}</span><br>${escH(c.text)}</div>`;
    } else {
      const ratioPct = c.ratio != null ? ` (${Math.round(c.ratio*100)}% match)` : '';
      return `<div class="chunk chunk-missing"><span class="chunk-tag chunk-tag-missing">FALTA</span><span class="chunk-src">${escH(c.src)}${ratioPct}</span><br>${escH(c.text)}</div>`;
    }
  };

  let html = '';
  if (missingChunks.length) {
    html += `<div style="margin:0 0 10px 0;padding:6px 10px;background:#dc3545;color:#fff;font-weight:bold;border-radius:4px;font-size:0.82rem;">
      ⚠ ${missingChunks.length} chunks faltantes en JSON
    </div>`;
    html += missingChunks.map(renderChunk).join('');
  } else if (total) {
    html += `<div style="margin:0 0 10px 0;padding:6px 10px;background:#198754;color:#fff;font-weight:bold;border-radius:4px;font-size:0.82rem;">
      ✓ Todos los chunks importantes presentes en JSON
    </div>`;
  }
  if (okChunks.length) {
    html += `<details style="margin-top:12px;"><summary style="cursor:pointer;padding:6px 10px;background:#d1e7dd;border-radius:4px;font-weight:bold;font-size:0.78rem;">
      ${okChunks.length} chunks OK (click para ver)
    </summary><div style="margin-top:6px;">${okChunks.map(renderChunk).join('')}</div></details>`;
  }
  if (shortChunks.length) {
    html += `<details style="margin-top:8px;"><summary style="cursor:pointer;padding:6px 10px;background:#f1f3f5;border-radius:4px;font-weight:bold;font-size:0.78rem;color:#666;">
      ${shortChunks.length} chunks cortos ignorados (click para ver)
    </summary><div style="margin-top:6px;">${shortChunks.map(renderChunk).join('')}</div></details>`;
  }
  if (!total) {
    html = '<div class="placeholder-msg">Sin chunks detectados en el HTML</div>';
  }
  htmlBody.innerHTML = html;

  updateSummary();
  renderTree(document.getElementById('searchInput').value.trim());
  // Re-mark active
  const el2 = document.querySelector(`.file-item[data-pi="${pi}"]`);
  if (el2) el2.classList.add('active');
}

// ─── SCAN ALL ────────────────────────────────────────────
async function scanAll() {
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  const all = [];
  for (const files of Object.values(TREE)) for (const f of files) all.push({ f, pi: getName(f) });
  const total = all.length;
  let done = 0;
  const CONCURRENCY = 8;
  // Procesar en paralelo por chunks
  for (let i = 0; i < all.length; i += CONCURRENCY) {
    const batch = all.slice(i, i + CONCURRENCY);
    await Promise.all(batch.map(async ({ f, pi }) => {
      if (piStats[pi]?.scanned) return;
      await scanPI(pi, f);
    }));
    done = Math.min(i + CONCURRENCY, total);
    btn.textContent = `Escaneando… ${done}/${total}`;
    updateSummary();
    renderTree(document.getElementById('searchInput').value.trim());
  }
  updateSummary();
  renderTree(document.getElementById('searchInput').value.trim());
  btn.disabled = false;
  btn.textContent = 'Escanear todos';
}

// ─── EVENTS ──────────────────────────────────────────────
document.getElementById('fileList').addEventListener('click', e => {
  const folder = e.target.closest('.folder-item');
  if (folder && !document.getElementById('searchInput').value.trim() && activeFilter === 'all') {
    const name = folder.dataset.folder;
    if (openFolders.has(name)) openFolders.delete(name);
    else openFolders.add(name);
    const fd = document.getElementById('fileList').querySelector(`.folder-files[data-folder="${name}"]`);
    if (fd) { folder.classList.toggle('open'); fd.classList.toggle('open'); }
    return;
  }
  const item = e.target.closest('.file-item');
  if (!item) return;
  selectPI(item.dataset.file, item.dataset.pi);
});

document.getElementById('searchInput').addEventListener('input', function() { renderTree(this.value.trim()); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderTree(document.getElementById('searchInput').value.trim());
  });
});

document.getElementById('scanBtn').addEventListener('click', scanAll);

// Divider drag
(function() {
  const div = document.getElementById('divider');
  let dragging = false;
  div.addEventListener('mousedown', () => { dragging = true; document.body.style.cursor='col-resize'; });
  document.addEventListener('mouseup', () => { dragging = false; document.body.style.cursor=''; });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const main = document.getElementById('main');
    const rect = main.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const left = document.getElementById('htmlPanel');
    const right = document.getElementById('jsonPanel');
    left.style.flex = `0 0 ${x}px`;
    right.style.flex = '1';
  });
})();

// ─── BOOT ────────────────────────────────────────────────
(async function init() {
  const [r1, r2] = await Promise.all([
    fetch('instrucciones_embalaje.json').then(r=>r.json()),
    fetch('embalajes_tabla_claude.json').then(r=>r.json())
  ]);
  instrMap = r1;
  if (Array.isArray(r2.instrucciones_embalaje)) {
    for (const e of r2.instrucciones_embalaje) tablaMap[String(e.codigo)] = e;
  }
  updateSummary();
  renderTree('');
  // Auto-escanear todo para poblar badges OK/FALTA en la sidebar
  scanAll();
})();
</script>
